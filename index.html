<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachingSync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#F4EFE6;--sand-dark:#E8DFD0;
  --ink:#1A1A18;--ink-soft:#3D3D38;--muted:#8A8A80;
  --white:#FDFCF8;
  --danger:#C0392B;--danger-light:#FADBD8;
  --meet:#1a73e8;--meet-light:#e8f0fe;
  --green:#3D5C40;--green-mid:#7A9E7E;--green-light:#C8DEC9;
  --orange:#C4793A;--orange-dark:#b5682f;
  --radius:12px;--radius-sm:6px;
  --HH:56px;--TC:50px;--SW:272px;
}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}

#loading-screen{position:fixed;inset:0;background:var(--sand);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spinner{width:34px;height:34px;border:3px solid var(--sand-dark);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HEADER */
header{background:var(--ink);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;height:53px}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:var(--white);letter-spacing:-.5px}
.logo span{color:var(--green-light)}
#user-badge{display:none;align-items:center;gap:8px;color:var(--green-light);font-size:12px}
.hdr-av{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--white);flex-shrink:0}
#logout-btn{background:none;border:1px solid rgba(255,255,255,.2);color:var(--green-light);padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
#logout-btn:hover{background:rgba(255,255,255,.1)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green-mid);display:inline-block}
.sync-dot.syncing{background:var(--orange);animation:pulse 1s infinite}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.login-card{background:var(--white);border-radius:20px;padding:42px 38px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.login-card h1{font-family:'DM Serif Display',serif;font-size:27px;color:var(--ink);margin-bottom:5px;line-height:1.2}
.login-card>p{color:var(--muted);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:13px}
.lbl{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=email],input[type=time],input[type=date],select{width:100%;padding:9px 11px;border:1.5px solid var(--sand-dark);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--white);transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--green)}
.btn-main{width:100%;padding:11px;background:var(--green);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-main:hover{background:var(--green-mid)}
.btn-main:disabled{background:var(--muted);cursor:not-allowed}
.remember-row{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.remember-row input{width:auto;accent-color:var(--green);cursor:pointer}
.remember-row label{font-size:12px;color:var(--ink-soft);cursor:pointer}
.login-error{font-size:12px;color:var(--danger);background:var(--danger-light);padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:12px;display:none}

/* ROLE OPTIONS — 3 cols */
.role-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.role-opt{border:1.5px solid var(--sand-dark);border-radius:var(--radius-sm);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .2s;line-height:1.4}
.role-opt:hover{border-color:var(--green);color:var(--green)}
.role-opt.sel{border-color:var(--green);background:#EAF2EA;color:var(--green);font-weight:500}
.role-opt .ri{font-size:16px;display:block}

/* APP */
#app{display:none}
.app-layout{display:grid;grid-template-columns:var(--SW) 1fr;min-height:calc(100vh - 53px)}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--sand-dark);padding:16px 14px;overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px}
.btn-add{width:100%;padding:10px;background:var(--orange);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:14px}
.btn-add:hover{background:var(--orange-dark)}
.s-sec-title{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.s-section{margin-bottom:14px}
.member-chip{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.member-chip:last-child{border-bottom:none}
.chip-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.chip-name{font-size:13px;font-weight:500;flex:1}
.my-slot-row{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--sand-dark);font-size:11px;cursor:pointer}
.my-slot-row:hover{background:var(--sand)}
.my-slot-row:last-child{border-bottom:none}
.ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* CALENDAR */
.cal-wrap{padding:16px 14px;overflow:hidden}
.cal-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.cal-topbar h2{font-family:'DM Serif Display',serif;font-size:18px}
.nav-btns{display:flex;gap:5px;align-items:center}
.nav-btn{background:var(--white);border:1.5px solid var(--sand-dark);width:29px;height:29px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.nav-btn:hover{border-color:var(--green);color:var(--green)}
.nav-today{width:auto!important;padding:0 10px!important;border-radius:16px!important;font-size:11px!important}
.tz-banner{font-size:11px;color:var(--green);background:var(--green-light);padding:4px 10px;border-radius:20px}
.hint-click{font-size:10px;color:var(--muted);font-style:italic}

.grid-outer{background:var(--white);border-radius:var(--radius);border:1px solid var(--sand-dark);overflow:hidden}
.day-headers{display:grid;grid-template-columns:var(--TC) repeat(7,1fr);border-bottom:1.5px solid var(--sand-dark);background:var(--white);position:sticky;top:53px;z-index:10}
.th-empty{border-right:1px solid var(--sand-dark)}
.day-hdr{padding:8px 3px;text-align:center;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-right:1px solid var(--sand-dark)}
.day-hdr:last-child{border-right:none}
.day-hdr .dnum{display:block;font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--ink);margin-top:2px;line-height:1.1}
.day-hdr.today .dnum{background:var(--green);color:var(--white);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.grid-scroll{overflow-y:auto;max-height:calc(100vh - 185px)}
.time-grid{display:grid;grid-template-columns:var(--TC) repeat(7,1fr)}
.time-labels{display:flex;flex-direction:column;border-right:1px solid var(--sand-dark)}
.time-label{height:var(--HH);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 6px 0 0;font-size:9px;color:var(--muted);flex-shrink:0;border-bottom:1px solid #f0ece3}
.time-label:last-child{border-bottom:none}
.day-column{position:relative;border-right:1px solid var(--sand-dark)}
.day-column:last-child{border-right:none}
.hour-cell{height:var(--HH);border-bottom:1px solid #f0ece3;cursor:pointer;transition:background .12s;position:relative}
.hour-cell:last-child{border-bottom:none}
.hour-cell:hover{background:rgba(61,92,64,.06)}
.hour-cell:hover::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;color:var(--green);opacity:.35;pointer-events:none}
.slot-block{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;cursor:pointer;overflow:hidden;transition:filter .15s,transform .15s;z-index:2}
.slot-block:hover{filter:brightness(.88);transform:scaleX(.95)}
.sb-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-time{font-size:9px;white-space:nowrap;opacity:.8}
.sb-extras{font-size:9px;opacity:.7;margin-top:1px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:450px;max-height:90vh;overflow-y:auto;position:relative}
.modal h3{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;padding-right:22px}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.modal-close:hover{color:var(--ink)}
.fg2{margin-bottom:11px}
.fg2 label{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tz-note{font-size:10px;color:var(--muted);margin-top:2px}
.check-row{display:flex;align-items:center;gap:7px;margin-bottom:12px}
.check-row input{width:auto;accent-color:var(--meet);cursor:pointer}
.check-row label{text-transform:none;font-size:12px;letter-spacing:0;color:var(--ink-soft);cursor:pointer}
.btn-pub{width:100%;padding:11px;background:var(--orange);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-pub:hover{background:var(--orange-dark)}
.btn-pub:disabled{background:var(--muted);cursor:not-allowed}
.btn-sec{width:100%;padding:9px;background:none;color:var(--green);border:1.5px solid var(--green);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px;transition:all .2s}
.btn-sec:hover{background:#EAF2EA}
.meet-box{background:var(--meet-light);border:1px solid #c5d9f7;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.meet-box a{color:var(--meet);font-size:12px;font-weight:500;text-decoration:none;word-break:break-all}
.meet-box a:hover{text-decoration:underline}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.mlist{margin-bottom:12px}
.ml-title{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mrow{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.mrow:last-child{border-bottom:none}
.mav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--white);flex-shrink:0}
.minfo{flex:1}
.mname{font-weight:500;font-size:12px}
.memail{font-size:10px;color:var(--muted)}
.mtime{font-size:10px;color:var(--muted);white-space:nowrap}
.join-sec{border-top:1px solid var(--sand-dark);padding-top:14px}
.join-sec h4{font-size:12px;font-weight:500;margin-bottom:8px}
.btn-join{width:100%;padding:10px;background:var(--green);color:var(--white);border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-join:hover{background:var(--green-mid)}
.btn-danger{width:100%;padding:8px;background:none;color:var(--danger);border:1.5px solid var(--danger);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-danger:hover{background:var(--danger-light)}
.info-box{background:#FFF8E6;border:1px solid #F5D87A;border-radius:var(--radius-sm);padding:8px 10px;font-size:11px;color:#7A5A00;margin-bottom:10px}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:10px 20px;border-radius:30px;font-size:12px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:720px){
  :root{--SW:0px;--HH:44px;--TC:32px}
  .sidebar{display:none}
  .app-layout{grid-template-columns:1fr}
  .sb-time{display:none}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:12px;color:var(--muted)">Conectando...</span>
</div>

<header>
  <div class="logo">coaching<span>sync</span></div>
  <div id="user-badge">
    <span class="sync-dot" id="sync-dot"></span>
    <div class="hdr-av" id="hdr-av"></div>
    <span id="hdr-name"></span>
    <button id="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-card">

<!-- APP -->
<div id="app">
  <div class="app-layout">
    <aside class="sidebar">
      <button class="btn-add" onclick="openCreate(null,null)">
        <span style="font-size:15px;line-height:1">+</span> Agregar disponibilidad
      </button>
      <div class="s-section">
        <div class="s-sec-title">Integrantes</div>
        <div id="members-panel"></div>
      </div>
      <div class="s-section">
        <div class="s-sec-title">Mis franjas</div>
        <div id="my-slots"></div>
      </div>
    </aside>

    <div class="cal-wrap">
      <div class="cal-topbar">
        <h2 id="week-label"></h2>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="tz-banner">🕐 Hora Argentina</span>
          <span class="hint-click">Clic en una hora para crear</span>
          <div class="nav-btns">
            <button class="nav-btn" onclick="cw(-1)">‹</button>

<div class="modal-bg" id="modal-bg" onclick="closeBg(event)">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,addDoc,deleteDoc,updateDoc,doc,onSnapshot,query,orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = { apiKey:"AIzaSyAwK4-4o9OR_kqbd8NmF-gfe9QEYhJODzg", authDomain:"coaching-calendar-navegantes.firebaseapp.com", projectId:"coaching-calendar-navegantes", storageBucket:"coaching-calendar-navegantes.firebasestorage.app", messagingSenderId:"149753426813", appId:"1:149753426813:web:11fb41a68ddbd690e49214" };
const db = getFirestore(initializeApp(FB));

// ── ALLOWED EMAILS ──
const ALLOWED = ['jorgepundang@gmail.com','caronarinsky@gmail.com','padinflavia@gmail.com','darianatirpak@gmail.com','miluavila44@gmail.com','rgiorgiotti@gmail.com','mikeyle3@gmail.com'];

// ── MEMBERS ──
const MEMBERS = [
  {name:'Coco', color:'#7B68EE', light:'#EEEAFF', email:'jorgepundang@gmail.com'},
  {name:'Romi', color:'#E8793A', light:'#FDEEE4', email:'rgiorgiotti@gmail.com'},
  {name:'Milu', color:'#2E9E75', light:'#D9F3EA', email:'miluavila44@gmail.com'},
  {name:'Caro', color:'#D4527A', light:'#FAE0EA', email:'caronarinsky@gmail.com'},
  {name:'Dari', color:'#2A8EC4', light:'#D8EEF9', email:'darianatirpak@gmail.com'},
  {name:'Fla',  color:'#C4A020', light:'#FBF3D0', email:'padinflavia@gmail.com'},
  {name:'Mikey',color:'#888780', light:'#F1EFE8', email:'mikeyle3@gmail.com'},
];
const DEF = {color:'#7A9E7E',light:'#C8DEC9'};
const mStyle = email => MEMBERS.find(m=>m.email===email?.toLowerCase()) || DEF;

// ── TIMEZONE ──
const AR = 'America/Argentina/Buenos_Aires';
const TZLIST = [AR,'America/Santiago','America/Lima','America/Bogota','America/Mexico_City','America/New_York','America/Los_Angeles','Europe/Madrid','Europe/London','America/Montevideo','America/Sao_Paulo'];
function localTz(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){return AR}}

// Convert "HH:MM" on dateStr from srcTz to AR timezone, returns {date, time}
function toAR(dateStr, timeStr, srcTz){
  if(!srcTz || srcTz===AR) return {date:dateStr, time:timeStr};
  try{
    const dt = new Date(`${dateStr}T${timeStr}:00`);
    const arStr = dt.toLocaleString('sv-SE',{timeZone:AR});
    const srcStr = dt.toLocaleString('sv-SE',{timeZone:srcTz});
    const arD = new Date(arStr), srcD = new Date(srcStr);
    const diffMs = arD - srcD;
    // apply diff to original time
    const orig = new Date(`${dateStr}T${timeStr}:00`);
    const adjusted = new Date(orig.getTime() + diffMs);
    const adjStr = adjusted.toLocaleString('sv-SE',{timeZone:'UTC'});
    return { date: adjStr.slice(0,10), time: adjStr.slice(11,16) };
  }catch(e){ return {date:dateStr,time:timeStr}; }
}

// ── CONSTANTS ──
const HS=7,HE=22,HH_PX=56;
const HOURS=Array.from({length:HE-HS},(_,i)=>HS+i);
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let cu=null,slots=[],wo=0,unsub=null,mRole=null;

const pad=n=>String(n).padStart(2,'0');
const fmtD=d=>d.toISOString().split('T')[0];
const isTod=d=>fmtD(d)===fmtD(new Date());
const inits=n=>n.split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');
const t2m=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const genMeet=()=>{const c='abcdefghijklmnopqrstuvwxyz',s=()=>Array.from({length:3},()=>c[~~(Math.random()*c.length)]).join('');return `https://meet.google.com/${s()}-${s()}-${s()}`};
const wkDays=off=>{const t=new Date(),mon=new Date(t);mon.setDate(t.getDate()-t.getDay()+1+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d})};

// ── INIT ──
document.getElementById('loading-screen').style.display='none';
const saved=localStorage.getItem('cu')||sessionStorage.getItem('cu');
if(saved){cu=JSON.parse(saved);showApp();}
else document.getElementById('login-screen').style.display='flex';

// ── AUTH ──
window.doLogin=()=>{
  const n=document.getElementById('ln').value.trim();
  const e=document.getElementById('le').value.trim().toLowerCase();
  const err=document.getElementById('login-error');
  err.style.display='none';
  if(!n||!e||!e.includes('@')){showToast('Completá nombre y Gmail');return}
  if(!ALLOWED.includes(e)){err.style.display='block';return}
  cu={name:n,email:e,tz:localTz()};
  const rem=document.getElementById('remember').checked;
  if(rem) localStorage.setItem('cu',JSON.stringify(cu));
  else sessionStorage.setItem('cu',JSON.stringify(cu));
  document.getElementById('login-screen').style.display='none';
  showApp();
};

window.logout=()=>{
  if(unsub)unsub();
  cu=null;
  localStorage.removeItem('cu');sessionStorage.removeItem('cu');
  document.getElementById('app').style.display='none';
  document.getElementById('user-badge').style.display='none';
  document.getElementById('login-screen').style.display='flex';
};

function showApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('user-badge').style.display='flex';
  document.getElementById('hdr-name').textContent=cu.name;
  const ms=mStyle(cu.email);
  const av=document.getElementById('hdr-av');
  av.textContent=inits(cu.name);av.style.background=ms.color;
  buildTimes();renderMembers();subscribe();
}

// ── FIRESTORE ──
function subscribe(){
  setSyncing(true);
  unsub=onSnapshot(query(collection(db,'slots'),orderBy('date')),snap=>{
    slots=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncing(false);renderCal();renderMySlots();
  },err=>{setSyncing(false);showToast('Error de conexión');console.error(err)});
}
const setSyncing=v=>{const d=document.getElementById('sync-dot');if(d)d.className='sync-dot'+(v?' syncing':'')};

// ── RENDER ──
function buildTimes(){
  document.getElementById('time-labels').innerHTML=HOURS.map(h=>`<div class="time-label">${pad(h)}:00</div>`).join('');
}
function renderMembers(){
  document.getElementById('members-panel').innerHTML=MEMBERS.map(m=>`
    <div class="member-chip">
      <div class="chip-dot" style="background:${m.color}"></div>
      <span class="chip-name">${m.name}</span>
    </div>`).join('');
}
function renderMySlots(){
  const el=document.getElementById('my-slots');
  const mine=slots.filter(s=>s.owner.email===cu.email).sort((a,b)=>a.date.localeCompare(b.date));
  if(!mine.length){el.innerHTML='<span style="color:var(--muted);font-size:11px">Sin franjas aún.</span>';return}
  const ms=mStyle(cu.email);
  el.innerHTML=mine.map(s=>{
    const d=new Date(s.date+'T12:00:00');
    return `<div class="my-slot-row" onclick="openSlotModal('${s.id}')">
      <div class="ms-dot" style="background:${ms.color}"></div>
      <div>
        <strong>${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</strong>
        <span style="color:var(--muted)"> ${s.from}–${s.to}</span>
        <span style="color:${ms.color}"> (${(s.members||[]).length} unidos)</span>
      </div>
    </div>`;
  }).join('');
}

function renderCal(){
  const days=wkDays(wo);
  const f=days[0],l=days[6];
  document.getElementById('week-label').textContent=`${f.getDate()} – ${l.getDate()} de ${MONTHS[l.getMonth()]} ${l.getFullYear()}`;
  document.getElementById('day-headers').innerHTML=`<div class="th-empty"></div>`+
    days.map(d=>`<div class="day-hdr${isTod(d)?' today':''}"><span>${DAYS[d.getDay()]}</span><span class="dnum">${d.getDate()}</span></div>`).join('');
  const grid=document.getElementById('time-grid');
  grid.querySelectorAll('.day-column').forEach(e=>e.remove());
  days.forEach(day=>{
    const ds=fmtD(day),col=document.createElement('div');
    col.className='day-column';
    HOURS.forEach(h=>{
      const c=document.createElement('div');c.className='hour-cell';
      c.addEventListener('click',()=>openCreate(ds,h));col.appendChild(c);
    });
    slots.filter(s=>s.date===ds).forEach(s=>col.appendChild(mkBlock(s)));
    grid.appendChild(col);
  });
}

function mkBlock(s){
  const isOwn=s.owner.email===cu.email;
  const joined=(s.members||[]).some(m=>m.email===cu.email);
  const ms=mStyle(s.owner.email);
  const top=((t2m(s.from)-HS*60)/60)*HH_PX;
  const h=Math.max(((t2m(s.to)-t2m(s.from))/60)*HH_PX,18);
  const b=document.createElement('div');
  b.className='slot-block';
  b.style.cssText=`top:${top}px;height:${h}px;background:${ms.light};border-left:3px solid ${ms.color}`;
  if(joined&&!isOwn) b.style.outline=`2px solid ${ms.color}`;
  const rL=s.role==='coach'?'🎯 coach':s.role==='cliente'?'🌱 cliente':s.role==='ambos'?'🎯🌱 ambos':'';
  const rHTML=rL?'<div class="sb-extras">'+rL+'</div>':'';
  const mHTML=s.meetLink?'<div class="sb-extras" style="color:#1a73e8">▶ Meet</div>':'';
  b.innerHTML='<div class="sb-name" style="color:'+ms.color+'">'+s.owner.name.split(' ')[0]+(isOwn?' ·yo':joined?' ·unido':'')+'</div>'
    +'<div class="sb-time" style="color:'+ms.color+'">'+s.from+'–'+s.to+'</div>'
    +rHTML+mHTML;
  b.addEventListener('click',e=>{e.stopPropagation();openSlotModal(s.id)});
  return b;
}

window.cw=dir=>{wo=dir===0?0:wo+dir;renderCal()};

// ── ROLE SELECTOR helper ──
function roleHTML(idPrefix, current){
  return `<div class="role-row3">
    <div class="role-opt${current==='coach'?' sel':''}" id="${idPrefix}-coach" onclick="selRole('${idPrefix}','coach')"><span class="ri">🎯</span>Coach</div>
    <div class="role-opt${current==='cliente'?' sel':''}" id="${idPrefix}-cliente" onclick="selRole('${idPrefix}','cliente')"><span class="ri">🌱</span>Cliente</div>
    <div class="role-opt${current==='ambos'?' sel':''}" id="${idPrefix}-ambos" onclick="selRole('${idPrefix}','ambos')"><span class="ri">🎯🌱</span>Ambos</div>
  </div>`;
}
window.selRole=(prefix,r)=>{
  mRole=r;
  ['coach','cliente','ambos'].forEach(x=>document.getElementById(`${prefix}-${x}`)?.classList.toggle('sel',x===r));
};

// ── CREATE MODAL ──
function openCreate(dateStr,hour){
  mRole=null;
  const ds=dateStr||fmtD(new Date());
  const fv=hour!=null?`${pad(hour)}:00`:'';
  const tv=hour!=null?`${pad(Math.min(hour+1,HE))}:00`:'';
  const tz=localTz();
  const tzOpts=TZLIST.map(z=>`<option value="${z}"${z===tz?' selected':''}>${z.replace(/_/g,' ')}</option>`).join('');
  document.getElementById('modal-content').innerHTML=`
    <h3>Agregar disponibilidad</h3>
    <div class="fg2"><label>Fecha</label><input type="date" id="cf-d" value="${ds}"/></div>
    <div class="two-col" style="margin-bottom:11px">
      <div class="fg2"><label>Desde</label><input type="time" id="cf-f" value="${fv}"/></div>
      <div class="fg2"><label>Hasta</label><input type="time" id="cf-t" value="${tv}"/></div>
    </div>
    <div class="fg2">
      <label>Zona horaria <span style="color:var(--muted);font-size:9px">(se convierte a hora AR)</span></label>
      <select id="cf-tz">${tzOpts}</select>
      <div class="tz-note">Detectada: ${tz}</div>
    </div>
    <div class="fg2"><label>Nota opcional</label><input type="text" id="cf-n" placeholder="Ej: disponible por Zoom"/></div>
    <div class="fg2">
      <label>Rol <span style="color:var(--muted);font-size:9px">(opcional)</span></label>
      <div style="margin-top:4px">${roleHTML('cr',null)}</div>
    </div>
    <div class="check-row"><input type="checkbox" id="cf-m" checked/><label for="cf-m">Generar enlace de Google Meet</label></div>
    <button class="btn-pub" id="cf-btn" onclick="doCreate()">Publicar franja horaria</button>`;
  document.getElementById('modal-bg').classList.add('open');
}
window.openCreate=openCreate;

window.doCreate=async()=>{
  const ds=document.getElementById('cf-d').value;
  const fr=document.getElementById('cf-f').value;
  const to=document.getElementById('cf-t').value;
  const note=document.getElementById('cf-n').value.trim();
  const tz=document.getElementById('cf-tz').value;
  const wm=document.getElementById('cf-m').checked;
  if(!ds||!fr||!to||fr>=to){showToast('Completá fecha y horario válido');return}
  // Convert to Argentina time
  const arFrom=toAR(ds,fr,tz);
  const arTo=toAR(ds,to,tz);
  const btn=document.getElementById('cf-btn');
  btn.disabled=true;btn.textContent='Publicando...';
  try{
    await addDoc(collection(db,'slots'),{
      owner:{name:cu.name,email:cu.email},
      date:arFrom.date, from:arFrom.time, to:arTo.time,
      note, tz, role:mRole||null,
      meetLink:wm?genMeet():null,
      members:[], createdAt:Date.now()
    });
    mRole=null;closeModal();showToast('✓ Franja publicada'+(wm?' con Meet':''));
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Publicar franja horaria'}
};

// ── EDIT MODAL ──
function openEdit(id){
  const s=slots.find(x=>x.id===id);if(!s)return;
  mRole=s.role||null;
  const tz=localTz();
  const tzOpts=TZLIST.map(z=>`<option value="${z}"${z===(s.tz||tz)?' selected':''}>${z.replace(/_/g,' ')}</option>`).join('');
  document.getElementById('modal-content').innerHTML=`
    <h3>Editar franja</h3>
    <div class="fg2"><label>Fecha</label><input type="date" id="ef-d" value="${s.date}"/></div>
    <div class="two-col" style="margin-bottom:11px">
      <div class="fg2"><label>Desde (hora AR)</label><input type="time" id="ef-f" value="${s.from}"/></div>
      <div class="fg2"><label>Hasta (hora AR)</label><input type="time" id="ef-t" value="${s.to}"/></div>
    </div>
    <div class="fg2"><label>Nota</label><input type="text" id="ef-n" value="${s.note||''}"/></div>
    <div class="fg2">
      <label>Rol</label>
      <div style="margin-top:4px">${roleHTML('er',s.role)}</div>
    </div>
    <div class="fg2"><label>Enlace Meet actual</label>
      ${s.meetLink?`<div style="font-size:11px;color:var(--meet);word-break:break-all">${s.meetLink}</div>`:
      '<div style="font-size:11px;color:var(--muted)">Sin enlace</div>'}
      <div class="check-row" style="margin-top:6px"><input type="checkbox" id="ef-nm"/><label for="ef-nm">Generar nuevo enlace Meet</label></div>
    </div>
    <button class="btn-pub" id="ef-btn" onclick="doEdit('${id}')">Guardar cambios</button>
    <button class="btn-danger" onclick="confirmDelete('${id}')">Eliminar esta franja</button>`;
  document.getElementById('modal-bg').classList.add('open');
}

window.doEdit=async(id)=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  const ds=document.getElementById('ef-d').value;
  const fr=document.getElementById('ef-f').value;
  const to=document.getElementById('ef-t').value;
  const note=document.getElementById('ef-n').value.trim();
  const newMeet=document.getElementById('ef-nm').checked;
  if(!ds||!fr||!to||fr>=to){showToast('Verificá fecha y horario');return}
  const btn=document.getElementById('ef-btn');
  btn.disabled=true;btn.textContent='Guardando...';
  try{
    await updateDoc(doc(db,'slots',id),{
      date:ds, from:fr, to, note,
      role:mRole||null,
      meetLink:newMeet?genMeet():(s.meetLink||null)
    });
    mRole=null;closeModal();showToast('✓ Franja actualizada');
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios'}
};

window.confirmDelete=async(id)=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  const hasMem=(s.members||[]).length>0;
  const msg=hasMem
    ? `¿Eliminar tu franja? Los ${s.members.length} compañero(s) unidos no perderán su espacio — se guardará como práctica independiente.`
    : '¿Eliminar esta franja?';
  if(!confirm(msg))return;
  try{
    if(hasMem){
      // Convert members' slots into independent slots
      for(const m of s.members){
        await addDoc(collection(db,'slots'),{
          owner:{name:m.name,email:m.email},
          date:s.date, from:m.from, to:m.to,
          note:`Práctica (de ${s.owner.name})`,
          meetLink:s.meetLink||null,
          role:m.role||null,
          members:[], createdAt:Date.now()
        });
      }
    }
    await deleteDoc(doc(db,'slots',id));
    closeModal();
    showToast(hasMem?'Franja eliminada — compañeros conservados':'Franja eliminada');
  }catch(e){showToast('Error: '+e.message)}
};

// ── SLOT DETAIL MODAL ──
function openSlotModal(id){
  const s=slots.find(x=>x.id===id);if(!s)return;
  const isOwn=s.owner.email===cu.email;
  const joined=(s.members||[]).some(m=>m.email===cu.email);
  const ms=mStyle(s.owner.email);
  const do_=new Date(s.date+'T12:00:00');
  const dl=`${DAYS[do_.getDay()]} ${do_.getDate()} de ${MONTHS[do_.getMonth()]}`;
  const roleB=s.role?`<span class="badge" style="background:${ms.light};color:${ms.color}">${s.role==='coach'?'🎯 Coach':s.role==='cliente'?'🌱 Cliente':'🎯🌱 Ambos'}</span>`:'';
  const meetH=s.meetLink?`<div class="meet-box"><span style="font-size:17px;flex-shrink:0">📹</span><div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Google Meet</div><a href="${s.meetLink}" target="_blank">${s.meetLink}</a></div></div>`:'';
  const membH=(s.members||[]).length?`<div class="mlist"><div class="ml-title">Quienes se unieron</div>${
    s.members.map(m=>{const mm=mStyle(m.email||'');return`<div class="mrow">
      <div class="mav" style="background:${mm.color}">${inits(m.name)}</div>
      <div class="minfo"><div class="mname">${m.name}</div><div class="memail">${m.email||''}</div></div>
      <div class="mtime">${m.from}–${m.to}${m.role?` · ${m.role==='coach'?'🎯':m.role==='cliente'?'🌱':'🎯🌱'}`:''}</div>
    </div>`}).join('')
  }</div>`:'';

  let act='';
  if(!isOwn&&!joined){
    mRole=null;
    act=`<div class="join-sec">
      <h4>Sumate a esta práctica</h4>
      <div class="two-col" style="margin-bottom:8px">
        <div class="fg2"><label>Desde</label><input type="time" id="jf" value="${s.from}"/></div>
        <div class="fg2"><label>Hasta</label><input type="time" id="jt" value="${s.to}"/></div>
      </div>
      <div class="fg2"><label>Rol <span style="color:var(--muted);font-size:9px">(opcional)</span></label>
        <div style="margin-top:4px">${roleHTML('jr',null)}</div>
      </div>
      <button class="btn-join" onclick="joinSlot('${id}')">Unirme a esta práctica</button>
    </div>`;
  } else if(joined){
    const me=s.members.find(m=>m.email===cu.email);
    act=`<div class="join-sec">
      <div style="color:var(--green);font-weight:500;font-size:12px;margin-bottom:8px">✓ Ya estás unido (${me.from}–${me.to}${me.role?' · '+me.role:''})</div>
      <button class="btn-danger" onclick="leaveSlot('${id}')">Salir de esta práctica</button>
    </div>`;
  } else {
    act=`<div class="join-sec">
      <button class="btn-sec" onclick="openEdit('${id}')">✏️ Editar esta franja</button>
      <button class="btn-danger" onclick="confirmDelete('${id}')">Eliminar esta franja</button>
    </div>`;
  }

  document.getElementById('modal-content').innerHTML=`
    <h3 style="color:${ms.color}">${s.owner.name}</h3>
    <div class="modal-meta">${dl} · ${s.from}–${s.to} ${roleB} ${s.note?`<span>· ${s.note}</span>`:''}</div>
    ${meetH}${membH}${act}`;
  document.getElementById('modal-bg').classList.add('open');
}
window.openSlotModal=openSlotModal;

window.joinSlot=async id=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  const fr=document.getElementById('jf').value,to=document.getElementById('jt').value;
  if(!fr||!to||fr>=to){showToast('Verificá el horario');return}
  if(fr<s.from||to>s.to){showToast('Debe estar dentro de la franja disponible');return}
  try{
    await updateDoc(doc(db,'slots',id),{members:[...(s.members||[]),{name:cu.name,email:cu.email,from:fr,to,role:mRole||null}]});
    mRole=null;closeModal();showToast('✓ Te uniste');sendMail(s,cu,fr,to);
  }catch(e){showToast('Error: '+e.message)}
};

window.leaveSlot=async id=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  try{
    await updateDoc(doc(db,'slots',id),{members:(s.members||[]).filter(m=>m.email!==cu.email)});
    closeModal();showToast('Saliste de la práctica');
  }catch(e){showToast('Error: '+e.message)}
};

window.closeModal=()=>document.getElementById('modal-bg').classList.remove('open');
window.closeBg=e=>{if(e.target===document.getElementById('modal-bg'))closeModal()};
window.openEdit=openEdit;

function sendMail(slot,joiner,from,to){
  const do_=new Date(slot.date+'T12:00:00');
  const dl=`${DAYS[do_.getDay()]} ${do_.getDate()} de ${MONTHS[do_.getMonth()]}`;
  const meet=slot.meetLink?`\n📹 Meet: ${slot.meetLink}`:'';
  const subj=encodeURIComponent(`${joiner.name} se sumó a tu práctica del ${dl}`);
  const body=encodeURIComponent(`Hola ${slot.owner.name},\n\n${joiner.name} (${joiner.email}) se unió a tu franja.\n\n📅 ${dl}\n🕐 ${from} – ${to} (hora Argentina)${meet}\n\nPodés responderle para confirmar.\n\n---\nCoachingSync`);
  window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(slot.owner.email)}&su=${subj}&body=${body}`,'_blank');
  showToast('✉ Gmail abierto');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
