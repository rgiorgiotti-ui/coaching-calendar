<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coaching Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #7A9E7E;
    --sage-light: #C8DEC9;
    --sage-dark: #3D5C40;
    --sand: #F4EFE6;
    --sand-dark: #E8DFD0;
    --ink: #1A1A18;
    --ink-soft: #3D3D38;
    --muted: #8A8A80;
    --white: #FDFCF8;
    --accent: #C4793A;
    --accent-light: #F2E4D4;
    --danger: #C0392B;
    --danger-light: #FADBD8;
    --radius: 12px;
    --radius-sm: 6px;
    font-size: 15px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--sage-light); }
  #user-badge {
    display: none;
    align-items: center;
    gap: 10px;
    color: var(--sand-dark);
    font-size: 13px;
  }
  #user-badge .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--sage-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--white);
  }
  #logout-btn {
    background: none; border: 1px solid rgba(255,255,255,0.2);
    color: var(--sand-dark); padding: 4px 12px; border-radius: 20px;
    cursor: pointer; font-size: 12px; font-family: inherit;
    transition: all 0.2s;
  }
  #logout-btn:hover { background: rgba(255,255,255,0.1); }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .login-card {
    background: var(--white);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%; max-width: 440px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  }
  .login-card h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px; color: var(--ink);
    margin-bottom: 6px; line-height: 1.1;
  }
  .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="text"], input[type="email"], input[type="time"], input[type="date"], textarea, select {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink);
    background: var(--white);
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--sage); }
  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--sage-dark);
    color: var(--white); border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-primary:hover { background: var(--sage); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* ── MAIN APP ── */
  #app { display: none; }
  .app-layout {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ── SIDEBAR ── */
  .sidebar {}
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 19px; margin-bottom: 16px;
    color: var(--ink);
  }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 16px;
    border: 1px solid var(--sand-dark);
  }

  /* Create slot form */
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-create {
    width: 100%; padding: 12px;
    background: var(--accent);
    color: var(--white); border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    margin-top: 12px;
  }
  .btn-create:hover { background: #b5682f; }

  /* EmailJS config */
  .config-toggle {
    font-size: 12px; color: var(--muted);
    cursor: pointer; text-decoration: underline;
    display: block; text-align: center;
    margin-top: 8px;
  }
  #emailjs-config { display: none; margin-top: 12px; }
  #emailjs-config input { margin-bottom: 8px; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── CALENDAR ── */
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .calendar-header h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
  }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    background: var(--white); border: 1.5px solid var(--sand-dark);
    width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer; font-size: 16px; color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--sage); color: var(--sage-dark); }

  /* Week grid */
  .week-grid {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--sand-dark);
    overflow: hidden;
  }
  .week-days {
    display: grid; grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--sand-dark);
  }
  .day-header {
    padding: 12px 8px; text-align: center;
    font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted);
    border-right: 1px solid var(--sand-dark);
  }
  .day-header:last-child { border-right: none; }
  .day-header .day-num {
    display: block;
    font-size: 18px; font-weight: 400;
    color: var(--ink); margin-top: 4px;
    font-family: 'DM Serif Display', serif;
  }
  .day-header.today .day-num {
    background: var(--sage-dark);
    color: var(--white);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
  }

  .week-slots {
    display: grid; grid-template-columns: repeat(7, 1fr);
    min-height: 200px;
  }
  .day-col {
    padding: 10px 6px;
    border-right: 1px solid var(--sand-dark);
    min-height: 200px;
  }
  .day-col:last-child { border-right: none; }

  /* ── SLOT CARD ── */
  .slot {
    background: var(--sage-light);
    border-left: 3px solid var(--sage-dark);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .slot:hover { background: #b8d4ba; transform: translateY(-1px); }
  .slot.own {
    background: var(--accent-light);
    border-left-color: var(--accent);
  }
  .slot.full {
    background: #f0f0ec;
    border-left-color: var(--muted);
    opacity: 0.7;
  }
  .slot-owner {
    font-size: 11px; font-weight: 600;
    color: var(--sage-dark);
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .slot.own .slot-owner { color: var(--accent); }
  .slot-time {
    font-size: 12px; color: var(--ink-soft);
    margin: 2px 0;
  }
  .slot-members {
    font-size: 11px; color: var(--muted);
    margin-top: 4px;
  }
  .slot-badge {
    display: inline-block;
    background: var(--sage-dark); color: var(--white);
    font-size: 9px; padding: 2px 6px; border-radius: 10px;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .slot.own .slot-badge { background: var(--accent); }

  /* ── MODAL ── */
  .modal-bg {
    display: none; position: fixed;
    inset: 0; background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 16px;
    padding: 32px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    position: relative;
  }
  .modal h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; margin-bottom: 4px;
  }
  .modal-meta { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: var(--muted); line-height: 1;
  }
  .modal-close:hover { color: var(--ink); }

  .members-list { margin-bottom: 20px; }
  .member-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--sand-dark);
    font-size: 13px;
  }
  .member-row:last-child { border-bottom: none; }
  .member-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--sage-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--sage-dark);
    flex-shrink: 0;
  }
  .member-info { flex: 1; }
  .member-name { font-weight: 500; }
  .member-email { font-size: 11px; color: var(--muted); }
  .member-time { font-size: 12px; color: var(--muted); }

  .join-section { border-top: 1px solid var(--sand-dark); padding-top: 20px; }
  .join-section h4 { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  .join-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .btn-join {
    width: 100%; padding: 12px;
    background: var(--sage-dark); color: var(--white);
    border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-join:hover { background: var(--sage); }
  .btn-join:disabled { background: var(--muted); cursor: not-allowed; }

  .btn-danger {
    width: 100%; padding: 10px;
    background: none; color: var(--danger);
    border: 1.5px solid var(--danger);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; margin-top: 8px;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: var(--danger-light); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--white);
    padding: 12px 24px; border-radius: 30px;
    font-size: 13px; z-index: 999;
    transition: transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── STATUS TAG ── */
  .status-tag {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 3px 8px; border-radius: 10px;
    text-transform: uppercase; letter-spacing: 0.3px;
    margin-left: 6px;
  }
  .status-open { background: #d4edda; color: #1d6630; }
  .status-joined { background: var(--accent-light); color: var(--accent); }
  .status-own { background: var(--sage-light); color: var(--sage-dark); }

  /* ── EMPTY DAY ── */
  .empty-day { font-size: 11px; color: var(--sand-dark); text-align: center; padding-top: 20px; }

  /* ── LEGEND ── */
  .legend {
    display: flex; gap: 16px; margin-top: 14px;
    font-size: 11px; color: var(--muted);
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
    flex-shrink: 0;
  }

  @media (max-width: 800px) {
    .app-layout { grid-template-columns: 1fr; }
    .week-slots { grid-template-columns: repeat(7,1fr); }
    .day-header { padding: 8px 4px; }
    .day-col { padding: 6px 3px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">coaching<span>sync</span></div>
  <div id="user-badge">
    <div class="avatar" id="header-avatar"></div>
    <span id="header-name"></span>
    <button id="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>Bienvenido al<br><em>grupo de práctica</em></h1>
    <p>Ingresá tu nombre y mail para ver y gestionar tu disponibilidad</p>
    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="login-name" placeholder="Ej: María González" />
    </div>
    <div class="form-group">
      <label>Tu email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" />
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar al calendario →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Create slot -->
      <div class="card">
        <div class="section-title">+ Nueva disponibilidad</div>
        <div class="form-group">
          <label>Día</label>
          <input type="date" id="slot-date" />
        </div>
        <div class="time-row">
          <div class="form-group">
            <label>Desde</label>
            <input type="time" id="slot-from" />
          </div>
          <div class="form-group">
            <label>Hasta</label>
            <input type="time" id="slot-to" />
          </div>
        </div>
        <div class="form-group">
          <label>Nota opcional</label>
          <input type="text" id="slot-note" placeholder="Ej: disponible en Zoom" />
        </div>
        <button class="btn-create" onclick="createSlot()">Publicar franja horaria</button>
      </div>



      <!-- My slots summary -->
      <div class="card">
        <div class="section-title">Mis franjas</div>
        <div id="my-slots-list" style="font-size:13px;color:var(--muted);">Sin franjas publicadas aún.</div>
      </div>

    </aside>

    <!-- CALENDAR -->
    <main>
      <div class="calendar-header">
        <h2 id="week-label">Semana actual</h2>
        <div class="nav-btns">
          <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
          <button class="nav-btn" onclick="changeWeek(0)" style="font-size:11px;width:auto;padding:0 10px;border-radius:20px;">Hoy</button>
          <button class="nav-btn" onclick="changeWeek(1)">›</button>
        </div>
      </div>

      <div class="week-grid">
        <div class="week-days" id="week-days"></div>
        <div class="week-slots" id="week-slots"></div>
      </div>

      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--sage-light);border-left:3px solid var(--sage-dark);"></div> Disponibilidad de otros</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent-light);border-left:3px solid var(--accent);"></div> Mi disponibilidad</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f0f0ec;border-left:3px solid var(--muted);"></div> Completo / sin cupo</div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────
let currentUser = null;
let weekOffset = 0;
let slots = JSON.parse(localStorage.getItem('coachingSlots') || '[]');

// Unique ID helper
const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);

// ── AUTH ──────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const email = document.getElementById('login-email').value.trim();
  if (!name || !email) { showToast('Por favor ingresá nombre y email'); return; }
  if (!email.includes('@')) { showToast('Email inválido'); return; }
  currentUser = { name, email };
  localStorage.setItem('coachingUser', JSON.stringify(currentUser));
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('header-name').textContent = name;
  document.getElementById('header-avatar').textContent = initials(name);
  renderCalendar();
  renderMySlots();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('coachingUser');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('user-badge').style.display = 'none';
}

function initials(name) {
  return name.split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');
}

// ── SLOTS ──────────────────────────────────────────────
function createSlot() {
  const date = document.getElementById('slot-date').value;
  const from = document.getElementById('slot-from').value;
  const to   = document.getElementById('slot-to').value;
  const note = document.getElementById('slot-note').value.trim();
  if (!date || !from || !to) { showToast('Completá fecha y horario'); return; }
  if (from >= to) { showToast('El horario de inicio debe ser antes del fin'); return; }

  const slot = {
    id: uid(),
    owner: { name: currentUser.name, email: currentUser.email },
    date, from, to, note,
    members: []
  };
  slots.push(slot);
  saveSlots();
  document.getElementById('slot-date').value = '';
  document.getElementById('slot-from').value = '';
  document.getElementById('slot-to').value = '';
  document.getElementById('slot-note').value = '';
  renderCalendar();
  renderMySlots();
  showToast('✓ Franja publicada');
}

function saveSlots() {
  localStorage.setItem('coachingSlots', JSON.stringify(slots));
}

// ── CALENDAR ──────────────────────────────────────────
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function getWeekDays(offset) {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + 1 + offset*7);
  const days = [];
  for (let i=0; i<7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d);
  }
  return days;
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function isToday(d) {
  return fmtDate(d) === fmtDate(new Date());
}

function renderCalendar() {
  const days = getWeekDays(weekOffset);
  const daysEl = document.getElementById('week-days');
  const slotsEl = document.getElementById('week-slots');

  // Label
  const first = days[0], last = days[6];
  document.getElementById('week-label').textContent =
    `${first.getDate()} – ${last.getDate()} de ${MONTHS_ES[last.getMonth()]} ${last.getFullYear()}`;

  // Headers
  daysEl.innerHTML = days.map(d => `
    <div class="day-header${isToday(d)?' today':''}">
      <span>${DAYS_ES[d.getDay()]}</span>
      <span class="day-num">${d.getDate()}</span>
    </div>
  `).join('');

  // Slots per day
  slotsEl.innerHTML = days.map((d,i) => {
    const dateStr = fmtDate(d);
    const daySlots = slots.filter(s => s.date === dateStr);
    const content = daySlots.length
      ? daySlots.map(s => slotCard(s)).join('')
      : `<div class="empty-day">·</div>`;
    return `<div class="day-col" id="day-${i}">${content}</div>`;
  }).join('');
}

function slotCard(s) {
  const isOwn = s.owner.email === currentUser.email;
  const joined = s.members.some(m => m.email === currentUser.email);
  let cls = isOwn ? 'slot own' : 'slot';
  let badge = isOwn ? '<span class="slot-badge">Mi franja</span>'
    : joined ? '<span class="slot-badge" style="background:var(--accent)">Unido</span>'
    : '';
  let memberCount = s.members.length;
  return `
    <div class="${cls}" onclick="openSlot('${s.id}')">
      <div class="slot-owner">${s.owner.name.split(' ')[0]}${badge}</div>
      <div class="slot-time">${s.from} – ${s.to}</div>
      ${memberCount > 0 ? `<div class="slot-members">${memberCount} compañero${memberCount>1?'s':''} unido${memberCount>1?'s':''}</div>` : ''}
      ${s.note ? `<div class="slot-members">${s.note}</div>` : ''}
    </div>`;
}

function changeWeek(dir) {
  if (dir === 0) weekOffset = 0;
  else weekOffset += dir;
  renderCalendar();
}

// ── MODAL ──────────────────────────────────────────────
function openSlot(id) {
  const s = slots.find(x => x.id === id);
  if (!s) return;
  const isOwn = s.owner.email === currentUser.email;
  const joined = s.members.some(m => m.email === currentUser.email);

  const dateObj = new Date(s.date + 'T12:00:00');
  const dateLabel = `${DAYS_ES[dateObj.getDay()]} ${dateObj.getDate()} de ${MONTHS_ES[dateObj.getMonth()]}`;

  let membersHtml = '';
  if (s.members.length) {
    membersHtml = `<div class="members-list">
      <div style="font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Quienes se unieron</div>
      ${s.members.map(m => `
        <div class="member-row">
          <div class="member-avatar">${initials(m.name)}</div>
          <div class="member-info">
            <div class="member-name">${m.name}</div>
            <div class="member-email">${m.email}</div>
          </div>
          <div class="member-time">${m.from} – ${m.to}</div>
        </div>`).join('')}
    </div>`;
  }

  let joinHtml = '';
  if (!isOwn && !joined) {
    joinHtml = `<div class="join-section">
      <h4>Sumate a esta práctica</h4>
      <div class="join-time-row">
        <div class="form-group">
          <label>Desde (dentro de ${s.from}–${s.to})</label>
          <input type="time" id="join-from" value="${s.from}" min="${s.from}" max="${s.to}" />
        </div>
        <div class="form-group">
          <label>Hasta</label>
          <input type="time" id="join-to" value="${s.to}" min="${s.from}" max="${s.to}" />
        </div>
      </div>
      <button class="btn-join" onclick="joinSlot('${id}')">Unirme a esta práctica</button>
    </div>`;
  } else if (joined) {
    const myEntry = s.members.find(m => m.email === currentUser.email);
    joinHtml = `<div class="join-section">
      <div style="color:var(--sage-dark);font-weight:500;font-size:14px;">✓ Ya estás unido (${myEntry.from}–${myEntry.to})</div>
      <button class="btn-danger" onclick="leaveSlot('${id}')">Salir de esta práctica</button>
    </div>`;
  } else if (isOwn) {
    joinHtml = `<div class="join-section">
      <button class="btn-danger" onclick="deleteSlot('${id}')">Eliminar esta franja</button>
    </div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <h3>${s.owner.name}</h3>
    <div class="modal-meta">${dateLabel} · ${s.from} – ${s.to}${s.note ? ' · ' + s.note : ''}</div>
    ${membersHtml}
    ${joinHtml}
  `;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalBg(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

function joinSlot(id) {
  const s = slots.find(x => x.id === id);
  if (!s) return;
  const from = document.getElementById('join-from').value;
  const to   = document.getElementById('join-to').value;
  if (!from || !to || from >= to) { showToast('Verificá el horario elegido'); return; }
  if (from < s.from || to > s.to) { showToast('El horario debe estar dentro de la franja disponible'); return; }

  s.members.push({ name: currentUser.name, email: currentUser.email, from, to });
  saveSlots();
  closeModal();
  renderCalendar();
  renderMySlots();
  showToast('✓ Te uniste a la práctica');
  sendEmailNotification(s, currentUser, from, to);
}

function leaveSlot(id) {
  const s = slots.find(x => x.id === id);
  if (!s) return;
  s.members = s.members.filter(m => m.email !== currentUser.email);
  saveSlots();
  closeModal();
  renderCalendar();
  renderMySlots();
  showToast('Saliste de la práctica');
}

function deleteSlot(id) {
  if (!confirm('¿Eliminár esta franja? Los compañeros unidos serán notificados.')) return;
  slots = slots.filter(s => s.id !== id);
  saveSlots();
  closeModal();
  renderCalendar();
  renderMySlots();
  showToast('Franja eliminada');
}

// ── MY SLOTS SIDEBAR ──────────────────────────────────
function renderMySlots() {
  const el = document.getElementById('my-slots-list');
  const mine = slots.filter(s => s.owner.email === currentUser.email)
    .sort((a,b) => a.date.localeCompare(b.date));
  if (!mine.length) { el.innerHTML = '<span style="color:var(--muted)">Sin franjas publicadas aún.</span>'; return; }
  el.innerHTML = mine.map(s => {
    const d = new Date(s.date + 'T12:00:00');
    return `<div style="padding:8px 0;border-bottom:1px solid var(--sand-dark);font-size:13px;">
      <strong>${DAYS_ES[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</strong>
      <span style="color:var(--muted)"> ${s.from}–${s.to}</span>
      <span style="color:var(--sage-dark)"> (${s.members.length} unidos)</span>
    </div>`;
  }).join('');
}

// ── EMAIL VÍA GMAIL ────────────────────────────────────
function sendEmailNotification(slot, joiner, from, to) {
  const dateObj = new Date(slot.date + 'T12:00:00');
  const dateLabel = `${DAYS_ES[dateObj.getDay()]} ${dateObj.getDate()} de ${MONTHS_ES[dateObj.getMonth()]}`;

  const subject = encodeURIComponent(`${joiner.name} se sumó a tu práctica del ${dateLabel}`);
  const body = encodeURIComponent(
`Hola ${slot.owner.name},

${joiner.name} (${joiner.email}) se unió a tu franja de práctica.

📅 Día: ${dateLabel}
🕐 Horario: ${from} – ${to}

Podés responderle directamente a este mail para confirmar o coordinar.

---
CoachingSync`
  );

  const gmailUrl = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(slot.owner.email)}&su=${subject}&body=${body}`;
  window.open(gmailUrl, '_blank');
  showToast('✉ Se abre Gmail con el mensaje listo para enviar');
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────
(function init() {
  // Set default date to today
  document.getElementById('slot-date').value = fmtDate(new Date());

  // Restore session
  const saved = localStorage.getItem('coachingUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('header-name').textContent = currentUser.name;
    document.getElementById('header-avatar').textContent = initials(currentUser.name);
    renderCalendar();
    renderMySlots();
  }
})();
</script>
</body>
</html>
