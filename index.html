<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachingSync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#F4EFE6;--sand-dark:#E8DFD0;
  --ink:#1A1A18;--ink-soft:#3D3D38;--muted:#8A8A80;--white:#FDFCF8;
  --danger:#C0392B;--danger-light:#FADBD8;
  --meet:#1a73e8;--meet-light:#e8f0fe;
  --green:#3D5C40;--green-mid:#7A9E7E;--green-light:#C8DEC9;
  --orange:#C4793A;--orange-dk:#b5682f;
  --r:12px;--rs:6px;--HH:56px;--TC:50px;--SW:272px;
}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
#ls{position:fixed;inset:0;background:var(--sand);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spin{width:34px;height:34px;border:3px solid var(--sand-dark);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;height:53px}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:var(--white);letter-spacing:-.5px}
.logo span{color:var(--green-light)}
#ub{display:none;align-items:center;gap:8px;color:var(--green-light);font-size:12px}
.hav{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--white);flex-shrink:0}
#lob{background:none;border:1px solid rgba(255,255,255,.2);color:var(--green-light);padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green-mid);display:inline-block}
.sdot.sy{background:var(--orange);animation:pulse 1s infinite}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.lcard{background:var(--white);border-radius:20px;padding:42px 38px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.lcard h1{font-family:'DM Serif Display',serif;font-size:27px;margin-bottom:5px;line-height:1.2}
.lcard>p{color:var(--muted);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:13px}
.lb{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=email],input[type=time],input[type=date],select{width:100%;padding:9px 11px;border:1.5px solid var(--sand-dark);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--white);transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--green)}
.bmain{width:100%;padding:11px;background:var(--green);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.bmain:hover{background:var(--green-mid)}
.bmain:disabled{background:var(--muted);cursor:not-allowed}
.remrow{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.remrow input{width:auto;accent-color:var(--green);cursor:pointer}
.remrow label{font-size:12px;color:var(--ink-soft);cursor:pointer}
.lerr{font-size:12px;color:var(--danger);background:var(--danger-light);padding:8px 10px;border-radius:var(--rs);margin-bottom:12px;display:none}
.rrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ropt{border:1.5px solid var(--sand-dark);border-radius:var(--rs);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .2s;line-height:1.4}
.ropt:hover{border-color:var(--green);color:var(--green)}
.ropt.sel{border-color:var(--green);background:#EAF2EA;color:var(--green);font-weight:500}
.ropt .ri{font-size:16px;display:block}
.badd-mentoring{width:100%;padding:10px;background:#3730a3;color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;margin-bottom:14px;line-height:1.3;text-align:left}
.badd-mentoring:hover{background:#2e2891}
.dc.weekend{background:rgba(107,95,199,.04)}
.dhd.weekend span{color:#6b5fc7}
.dhd.weekend .dn{color:#6b5fc7}
.now-line-wrap{position:absolute;left:var(--TC);right:0;height:2px;z-index:15;pointer-events:none;display:flex;align-items:center}
.now-dot{width:10px;height:10px;border-radius:50%;background:#E53935;flex-shrink:0}
.now-bar{flex:1;height:2px;background:#E53935}
.gs-wrap{position:relative;flex:1;overflow:hidden;min-height:0;height:0}
.gs-inner{height:100%;overflow-y:auto;scroll-behavior:smooth}
.gs-inner::-webkit-scrollbar{width:3px}
.gs-inner::-webkit-scrollbar-thumb{background:var(--sand-dark);border-radius:3px}
.scroll-arrow{position:absolute;left:50%;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;background:var(--white);border:1.5px solid var(--sand-dark);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:30;font-size:15px;color:var(--ink-soft);box-shadow:0 2px 8px rgba(0,0,0,.15);transition:opacity .2s;user-select:none}
.scroll-arrow:hover{background:var(--sand);color:var(--ink)}
.scroll-arrow.sa-up{top:6px}
.scroll-arrow.sa-dn{bottom:6px}
.scroll-arrow.sa-hide{opacity:0;pointer-events:none}
.fade-grad{position:absolute;left:0;right:0;height:28px;pointer-events:none;z-index:20;transition:opacity .15s}
.fade-grad.fg-top{top:0;background:linear-gradient(to bottom,var(--white),transparent)}
.fade-grad.fg-bot{bottom:0;background:linear-gradient(to top,var(--white),transparent)}
.fade-grad.fg-hide{opacity:0}
.mentoring-block{background:#EEF2FF;border-left:3px solid #3730a3}
.mentoring-block .sbe{color:#3730a3}
.mentoring-block .sbn{color:#3730a3}
.mentoring-block .sbt{color:#3730a3;opacity:.7}
#app{display:none}
.al{display:grid;grid-template-columns:var(--SW) 1fr;min-height:calc(100vh - 53px);overflow:visible}
.sb{background:var(--white);border-right:1px solid var(--sand-dark);padding:16px 14px;overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px}
.badd{width:100%;padding:10px;background:var(--orange);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px}
.badd:hover{background:var(--orange-dk)}
.badd-study{width:100%;padding:10px;background:#7B68EE;color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:8px}
.badd-study:hover{background:#6a58e0}
.badd-meet{width:100%;padding:10px;background:#1a73e8;color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:14px;text-decoration:none}
.badd-meet:hover{background:#1558b0}
.study-topic{font-size:9px;font-weight:600;font-style:italic;text-transform:none;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.study-badge{background:#EDE9FF;color:#5B4FCF;font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;display:inline-block}
.stit{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ssec{margin-bottom:14px}
.mchip{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.mchip:last-child{border-bottom:none}
.cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.msr{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--sand-dark);font-size:11px;cursor:pointer}
.msr:hover{background:var(--sand)}
.msr:last-child{border-bottom:none}
.msd{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cw{padding:16px 14px;overflow:visible}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ctop h2{font-family:'DM Serif Display',serif;font-size:18px}
.nbts{display:flex;gap:5px;align-items:center}
.nb{background:var(--white);border:2px solid var(--sand-dark);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:20px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit;font-weight:300}
.nb:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}
.nbt{width:auto!important;padding:0 14px!important;border-radius:20px!important;font-size:12px!important;font-weight:500!important;height:38px!important}
.tzb{font-size:11px;color:var(--green);background:var(--green-light);padding:4px 10px;border-radius:20px}
.hc{font-size:10px;color:var(--muted);font-style:italic}
.go{background:var(--white);border-radius:var(--r);border:1px solid var(--sand-dark);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 185px)}
.dh{display:grid;grid-template-columns:var(--TC) repeat(7,1fr);border-bottom:1.5px solid var(--sand-dark);background:var(--white);position:sticky;top:53px;z-index:10}
.the{border-right:1px solid var(--sand-dark);width:var(--TC);min-width:var(--TC);max-width:var(--TC)}
.nav-arr{display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:300;color:var(--muted);cursor:pointer;border-right:1px solid var(--sand-dark);transition:all .15s;user-select:none;background:var(--white)}
.nav-arr:hover{background:var(--sand);color:var(--ink)}
.nav-arr.nar{border-right:none;border-left:1px solid var(--sand-dark)}
.nav-col{border-right:1px solid var(--sand-dark)}
.nav-col-r{border-left:1px solid var(--sand-dark)}
.dhd.tod-col-hdr{background:rgba(61,92,64,.07)}
.dhd.tod-col-hdr>span:first-child{color:var(--green)!important;font-weight:600}
.dc.tod-col{background:rgba(61,92,64,.04)}
.dhd{padding:8px 3px;text-align:center;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-right:1px solid var(--sand-dark)}
.dhd:last-child{border-right:none}
.dhd .dn{display:block;font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--ink);margin-top:2px;line-height:1.1}
.dhd.tod-col-hdr .dn{
  background:var(--green);color:var(--white);
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;margin:2px auto 0;line-height:1}
.gs{}
.tg{display:grid;grid-template-columns:var(--TC) repeat(7,1fr)}
.tls{display:flex;flex-direction:column;border-right:1px solid var(--sand-dark);width:var(--TC);min-width:var(--TC);max-width:var(--TC)}
.tl{height:var(--HH);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 6px 0 0;font-size:9px;color:var(--muted);flex-shrink:0;border-bottom:1px solid #f0ece3}
.tl:last-child{border-bottom:none}
.dc{position:relative;border-right:1px solid var(--sand-dark)}
.dc:last-child{border-right:none}
.hcl{height:var(--HH);border-bottom:1px solid #f0ece3;cursor:pointer;transition:background .12s;position:relative}
.hcl:last-child{border-bottom:none}
.hcl:hover{background:rgba(61,92,64,.06)}
.hcl:hover::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;color:var(--green);opacity:.35;pointer-events:none}
.sb2{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;cursor:pointer;overflow:hidden;transition:filter .15s,transform .15s;z-index:2}
.sb2:hover{filter:brightness(.88);transform:scaleX(.95)}
.sbn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbt{font-size:9px;white-space:nowrap;opacity:.8}
.sbe{font-size:9px;opacity:.7;margin-top:1px}
/* Slot block enhancements */
.sb2.tentative{border-style:dashed;border-width:2px;opacity:.85}
.sb2.tentative .sbn::after{content:' ?';opacity:.6}
.slot-footer{display:flex;align-items:center;gap:3px;margin-top:2px;flex-wrap:wrap}
.pcount{font-size:9px;color:inherit;opacity:.8;display:flex;align-items:center;gap:2px}
.av-mini{width:12px;height:12px;border-radius:50%;display:inline-block;border:1px solid rgba(255,255,255,.5);margin-left:-3px;flex-shrink:0}
.av-mini:first-child{margin-left:0}
/* Member overlay stripes inside block */
.mem-stripe{position:absolute;left:0;right:0;pointer-events:none;border-radius:0}
/* Tentative badge */
.tent-badge{font-size:8px;background:rgba(0,0,0,.15);color:inherit;padding:1px 4px;border-radius:3px;margin-top:1px;display:inline-block}
/* In modal: tentative alert */
.tent-alert{background:#FFF8E1;border:1px solid #FFD54F;border-radius:var(--rs);padding:8px 10px;font-size:11px;color:#7A5A00;margin-bottom:10px;display:flex;align-items:flex-start;gap:6px}
/* Join type selector */
.jtype-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.jtype-opt{border:1.5px solid var(--sand-dark);border-radius:var(--rs);padding:8px 6px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .2s;line-height:1.5}
.jtype-opt:hover{border-color:var(--green);color:var(--green)}
.jtype-opt.sel{border-color:var(--green);background:#EAF2EA;color:var(--green);font-weight:500}
.jtype-opt.tent-sel{border-color:var(--orange);background:#FFF3EA;color:var(--orange);font-weight:500}
.jtype-opt .ri{font-size:16px;display:block}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.mbg.op{display:flex}
.mo{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:450px;max-height:90vh;overflow-y:auto;position:relative}
.mo h3{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;padding-right:22px}
.mme{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mc{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.mc:hover{color:var(--ink)}
.fg2{margin-bottom:11px}
.fg2 label{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tzn{font-size:10px;color:var(--muted);margin-top:2px}
.ckr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ckr input{width:auto;accent-color:var(--meet);cursor:pointer}
.ckr label{text-transform:none;font-size:12px;letter-spacing:0;color:var(--ink-soft);cursor:pointer}
.bpub{width:100%;padding:11px;background:var(--orange);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:4px}
.bpub:hover{background:var(--orange-dk)}
.bpub:disabled{background:var(--muted);cursor:not-allowed}
.bsec{width:100%;padding:9px;background:none;color:var(--green);border:1.5px solid var(--green);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px;transition:all .2s}
.bsec:hover{background:#EAF2EA}
.mtbox{background:var(--meet-light);border:1px solid #c5d9f7;border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;display:flex;align-items:flex-start;gap:8px}
.mtbox a{color:var(--meet);font-size:12px;font-weight:500;text-decoration:none;word-break:break-all}
.mtbox a:hover{text-decoration:underline}
.gcbox{background:#fff8e1;border:1px solid #ffe082;border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.gcbox a{color:#1565c0;font-size:12px;font-weight:500;text-decoration:none}
.gcbox a:hover{text-decoration:underline}
.bdg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.mls{margin-bottom:12px}
.mlt{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mrow{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.mrow:last-child{border-bottom:none}
.mav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--white);flex-shrink:0}
.min2{flex:1}
.mnm{font-weight:500;font-size:12px}
.mem{font-size:10px;color:var(--muted)}
.mtm{font-size:10px;color:var(--muted);white-space:nowrap}
.jsc{border-top:1px solid var(--sand-dark);padding-top:14px}
.jsc h4{font-size:12px;font-weight:500;margin-bottom:8px}
.bjoin{width:100%;padding:10px;background:var(--green);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.bjoin:hover{background:var(--green-mid)}
.bdng{width:100%;padding:8px;background:none;color:var(--danger);border:1.5px solid var(--danger);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;transition:all .2s}
.bdng:hover{background:var(--danger-light)}
.infonote{background:var(--green-light);border-radius:var(--rs);padding:7px 10px;font-size:11px;color:var(--green);margin-bottom:12px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:10px 20px;border-radius:30px;font-size:12px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:720px){:root{--SW:0px;--HH:44px;--TC:32px}.sb{display:none}.al{grid-template-columns:1fr}.sbt{display:none}}
</style>
</head>
<body>
<div id="ls"><div class="spin"></div><span style="font-size:12px;color:var(--muted)">Conectando...</span></div>
<header>
  <div class="logo">coaching<span>sync</span></div>
  <div id="ub">
    <span class="sdot" id="sd"></span>
    <div class="hav" id="hav"></div>
    <span id="hn"></span>
    <button id="lob" onclick="logout()">Salir</button>
  </div>
</header>
<div id="login" style="display:none">
  <div class="lcard">
    <h1>Bienvenido al<br><em>grupo de practica</em></h1>
    <p>Ingresa tu nombre y Gmail para continuar</p>
    <div id="lerr" class="lerr">Email no autorizado.</div>
    <div class="fg"><span class="lb">Tu nombre</span><input type="text" id="ln" placeholder="Ej: Romi"/></div>
    <div class="fg"><span class="lb">Tu Gmail</span><input type="email" id="le" placeholder="tu@gmail.com"/></div>
    <div class="remrow"><input type="checkbox" id="rem" checked/><label for="rem">Recordar mis datos en este dispositivo</label></div>
    <button class="bmain" onclick="doLogin()">Entrar al calendario</button>
  </div>
</div>
<div id="app">
  <div class="al">
    <aside class="sb">
      <button class="badd" onclick="openCreate(null,null)"><span style="font-size:13px;font-weight:700">+</span><span style="font-size:15px">&#128483;</span> Agregar disponibilidad</button>
      <button class="badd-study" onclick="openStudy(null,null)"><span style="font-size:13px;font-weight:700">+</span><span style="font-size:15px">&#128218;</span> Repaso te&#243;rico</button>
      <a class="badd-meet" href="https://meet.google.com/new" target="_blank"><span style="font-size:13px;font-weight:700">+</span><span style="font-size:15px">&#128249;</span> Generar Meet</a>
      <button class="badd-mentoring" onclick="openMentoring()"><span style="font-size:13px;font-weight:700;flex-shrink:0">+</span> &#191;Hay mentoring? &#161;Agregalo!</button>
      <div class="ssec"><div class="stit">Integrantes</div><div id="mp"></div></div>
      <div class="ssec"><div class="stit">Mis pr&#225;cticas</div><div id="ms2"></div></div>
      <div class="ssec"><div class="stit">Mis repasos</div><div id="ms3"></div></div>
      <div class="ssec"><div class="stit">Mentorings Axon</div><div id="ms4"></div></div>
    </aside>
    <div class="cw">

// Get UTC offset in minutes for a timezone on a given date
// Returns minutes to ADD to local time to get UTC (e.g. Bogota UTC-5 -> +300)
function tzOffset(date, tz) {
  var probe = new Date(date + 'T12:00:00Z');
  var tzStr = probe.toLocaleString('sv-SE', {timeZone: tz});
  var utcStr = probe.toLocaleString('sv-SE', {timeZone: 'UTC'});
  return (new Date(utcStr) - new Date(tzStr)) / 60000;
}

// Convert local time in srcTz -> Argentina time (for storing)
// Correctly treats input as "this time in srcTz", not local browser time
function toAR(date, time, srcTz) {
  if (!srcTz || srcTz === AR) return {date: date, time: time};
  try {
    var p = date.split('-'), tp = time.split(':');
    var srcMs = Date.UTC(+p[0], +p[1]-1, +p[2], +tp[0], +tp[1], 0);
    var utcMs = srcMs + tzOffset(date, srcTz) * 60000;
    var utcDate = new Date(utcMs);
    var arStr = utcDate.toLocaleString('sv-SE', {timeZone: AR});
    return {date: arStr.slice(0,10), time: arStr.slice(11,16)};
  } catch(x) { return {date: date, time: time}; }
}

// Convert Argentina time -> local tz (for editing display only)
function arToLocal(date, time, dstTz) {
  if (!dstTz || dstTz === AR) return {date: date, time: time};
  try {
    var p = date.split('-'), tp = time.split(':');
    var arMs = Date.UTC(+p[0], +p[1]-1, +p[2], +tp[0], +tp[1], 0);
    var utcMs = arMs + tzOffset(date, AR) * 60000;
    var localMs = utcMs - tzOffset(date, dstTz) * 60000;
    var localDate = new Date(localMs);
    var localStr = localDate.toLocaleString('sv-SE', {timeZone: 'UTC'});
    return {date: localStr.slice(0,10), time: localStr.slice(11,16)};
  } catch(x) { return {date: date, time: time}; }
}

// Build Google Calendar URL
// date/from/to are stored in Argentina time — convert to UTC for Google Calendar
function gcalURL(title, date, from, to, meet) {
  function p2(n) { return String(n).padStart(2,'0'); }
  function arToUTCStr(d, t) {
    var p = d.split('-'), tp = t.split(':');
    // Treat d+t as Argentina local time, convert to UTC using live offset
    var arMs = Date.UTC(+p[0], +p[1]-1, +p[2], +tp[0], +tp[1], 0);
    var offsetMin = tzOffset(d, AR); // minutes to add local->UTC
    var utcMs = arMs + offsetMin * 60000;
    var u = new Date(utcMs);
    return ''+u.getUTCFullYear()+p2(u.getUTCMonth()+1)+p2(u.getUTCDate())
      +'T'+p2(u.getUTCHours())+p2(u.getUTCMinutes())+'00Z';
  }
  var desc = 'Practica de coaching. Ver: '+CAL_URL+(meet?' Meet: '+meet:'');
  var loc = meet || 'CoachingSync';
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(title)
    +'&dates='+arToUTCStr(date,from)+'/'+arToUTCStr(date,to)
    +'&details='+encodeURIComponent(desc)
    +'&location='+encodeURIComponent(loc);
}

  var tg=document.getElementById('tg');

  tg.querySelectorAll('.now-line-wrap').forEach(function(e){e.remove()});

  var hasTod=days.some(function(d){return fD(d)===todayStr});
  if(!hasTod)return;

  var arStr=now.toLocaleString('sv-SE',{timeZone:'America/Argentina/Buenos_Aires'});
  var arH=+arStr.slice(11,13),arMin=+arStr.slice(14,16);
  var totalMin=arH*60+arMin;

      ?'<div class="sbe" style="color:#3730a3;opacity:.75;font-weight:700">&#127979; Mentoring Axon</div>'

var parsedMentoring=null;
window.parseMentoring=function(){
  var raw=document.getElementById('mt-raw').value.trim();
  if(!raw){showToast('Pega los datos primero');return}
  var lines=raw.split(String.fromCharCode(10)).map(function(l){return l.trim()}).filter(function(l){return l});
  // Parse title: first line
  var title=lines[0]||'';
  // Parse date/time: look for dd/mm/yyyy - HH:MM
  var dateTime='',date='',timeStr='';
  for(var i=0;i<lines.length;i++){
    var m=lines[i].match(/(\d{2})\/(\d{2})\/(\d{4})\s*-\s*(\d{2}):(\d{2})/);
    if(m){
      date=m[3]+'-'+m[2]+'-'+m[1];
      timeStr=m[4]+':'+m[5];
      break;
    }
  }
  // Parse mentor: last line that doesn't look like orientation/date
  var mentor='';
  for(var j=lines.length-1;j>=0;j--){
    if(!lines[j].match(/orientaci/i)&&!lines[j].match(/\d{2}\/\d{2}/)&&lines[j]!==title){
      mentor=lines[j];break;
    }
  }
  if(!date||!timeStr){showToast('No encontre fecha/hora. Formato esperado: DD/MM/YYYY - HH:MM');return}
  // Calculate end time: mentorings typically last 1.5h
  var tParts=timeStr.split(':');
  var endMin=(+tParts[0])*60+(+tParts[1])+90;
  if(endMin>=22*60) endMin=22*60;
  var toTime=pad(Math.floor(endMin/60))+':'+pad(endMin%60);
  parsedMentoring={title:title,date:date,time:timeStr,toTime:toTime,mentor:mentor};
  var dl=fmtDL(date);
  document.getElementById('mt-title-disp').textContent=title;
  document.getElementById('mt-mentor-disp').textContent=mentor;
  document.getElementById('mt-date-disp').textContent=dl+' · '+timeStr+' hs';
  document.getElementById('mt-preview').style.display='block';
  // Wire WA and GCal buttons
  var endTime=timeStr.split(':');
  var endH=Math.min(+endTime[0]+1,22);
  var toStr=pad(endH)+':'+endTime[1];
  var waBtn=document.getElementById('mt-wa-btn');
  var gcBtn=document.getElementById('mt-gc-btn');
  waBtn.onclick=function(){
    var msg=encodeURIComponent('Hay un Mentoring Axon: '+title+' — '+dl+' a las '+timeStr+' hs.'+(mentor?' Con '+mentor+'.':'')+' Sumate desde el calendario: '+CAL_URL);
    window.open('https://wa.me/?text='+msg,'_blank');
  };
  gcBtn.onclick=function(){
    window.open(gcalURL(title,date,timeStr,toStr,null),'_blank');
  };
};

    +'<div class="fg2"><label>Nota</label><input type="text" id="ef-n" value="'+(s.note||'')+'"/></div>'
    +'<div class="fg2"><label>Rol</label><div style="margin-top:4px">'+roleHTML('er',s.role)+'</div></div>'
    +'<div class="fg2"><label>Meet actual</label>'+meetInfo+caroNote+'</div>'
    +'<button class="bpub" id="ef-btn" onclick="doEdit(\''+id+'\')">Guardar cambios</button>'
    +'<button class="bdng" onclick="confirmDel(\''+id+'\')">Eliminar esta franja</button>';
  document.getElementById('mbg').className='mbg op';
}
window.openEdit=openEdit;

window.doEdit=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var ds=document.getElementById('ef-d').value;
  var frL=document.getElementById('ef-f').value;
  var toL=document.getElementById('ef-t').value;
  var tz=document.getElementById('ef-tz').value;
  var note=document.getElementById('ef-n').value.trim();
  frL=parseTime(frL);toL=parseTime(toL);if(!ds||!frL||!toL||frL>=toL){showToast('Verifica horario (HH:MM)');return}
  var aF=toAR(ds,frL,tz);
  var aT=toAR(ds,toL,tz);
  // Caro keeps fixed meet; others keep existing meet (no regen on edit)
  var newMeet=s.owner.email===CARO?CARO_MEET:(s.meetLink||getMeet(s.owner.email));
  var btn=document.getElementById('ef-btn');
  btn.disabled=true;btn.textContent='Guardando...';
  var oldFrom=s.from,oldTo=s.to;
  try{
    var topicEl=document.getElementById('ef-topic');
    var updData={date:aF.date,from:aF.time,to:aT.time,note:note,tz:tz,role:mRole,meetLink:newMeet};
    if(topicEl) updData.topic=topicEl.value.trim();
    await updateDoc(doc(db,'slots',id),updData);
    mRole=null;closeMo();showToast('Franja actualizada');
    if((aF.time!==oldFrom||aT.time!==oldTo)&&(s.members||[]).length>0){
      var updated=Object.assign({},s,{from:aF.time,to:aT.time,meetLink:newMeet});
      notifyEditedToMembers(updated,oldFrom,oldTo);
    }
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios'}
};

window.confirmDel=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var mem=s.members||[];
  var msg=mem.length>0
    ?'Eliminar tu franja? Los '+mem.length+' companeros unidos conservaran su practica independiente y recibiran notificacion.'
    :'Eliminar esta franja?';
  if(!confirm(msg))return;
  try{
    if(mem.length>0) notifyCancelledToMembers(s);
    for(var i=0;i<mem.length;i++){
      var m=mem[i];
      await addDoc(collection(db,'slots'),{
        owner:{name:m.name,email:m.email},
        date:s.date,from:m.from,to:m.to,
        note:'Practica (de '+s.owner.name+')',
        meetLink:s.meetLink||null,role:m.role||null,
        members:[],createdAt:Date.now()
      });
    }
    await deleteDoc(doc(db,'slots',id));
    closeMo();
    showToast(mem.length>0?'Franja eliminada - companeros conservados':'Franja eliminada');
  }catch(e){showToast('Error: '+e.message)}
};

// ── SLOT DETAIL ──
function openSlotMo(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var isStudy=s.type==='study';
  var isMentoring=s.type==='mentoring';
  var isOwn=s.owner.email===cu.email;
  var joined=(s.members||[]).some(function(m){return m.email===cu.email});
  var m=isStudy?mStyle(s.owner.email):{c:mStyle(s.owner.email).c,l:mStyle(s.owner.email).l};
  var dl=fmtDL(s.date);
  var rl=rIcon(s.role);
  var typePrefix=isStudy?'<span style="font-size:12px">&#128218;</span> Repaso te&#243;rico':isMentoring?'<span style="font-size:12px">&#127979;</span> Mentoring Axon':'<span style="font-size:12px">&#128483;</span> Disponible pr&#225;ctica';
  if(isMentoring) m={c:'#3730a3',l:'#EEF2FF'};
  var html='<div style="font-size:10px;font-weight:700;color:'+m.c+';opacity:.75;margin-bottom:2px">'+typePrefix+'</div>';
  html+='<h3 style="color:'+m.c+'">'+s.owner.name+'</h3>';
  if(isStudy&&s.topic) html+='<div style="font-size:13px;font-weight:600;color:'+m.c+';margin-bottom:8px;padding:6px 10px;background:'+m.l+';border-radius:var(--rs)">'+s.topic+'</div>';
  if(isMentoring&&s.title) html+='<div style="font-size:13px;font-weight:600;color:#3730a3;margin-bottom:4px;padding:6px 10px;background:#EEF2FF;border-radius:var(--rs)">'+s.title+'</div>';
  if(isMentoring&&s.mentor) html+='<div style="font-size:11px;color:#3730a3;opacity:.8;margin-bottom:8px;padding:0 2px">'+s.mentor+'</div>';
  html+='<div class="mme">'+dl+' '+s.from+'-'+s.to;
  if(rl) html+=' <span class="bdg" style="background:'+m.l+';color:'+m.c+'">'+rl+'</span>';
  if(isStudy) html+=' <span class="study-badge">estudio</span>';
  if(s.note) html+='<span> '+s.note+'</span>';
  html+='</div>';
  var evTitle=isStudy?('Repaso: '+(s.topic||'')):(isMentoring?(s.title||'Mentoring Axon'):('Practica - '+s.owner.name));
  var slotLink=CAL_URL+'?slot='+s.id;
  var evDesc=isStudy?'Agende un repaso teorico sobre "'+s.topic+'"':isMentoring?'Hay un Mentoring Axon: '+(s.title||''):'Agende una practica de conversacion';
  var waMsg=encodeURIComponent(evDesc+' para el '+fmtDL(s.date)+' de '+s.from+' a '+s.to+' hs. Si queres unirte hace clic aqui: '+slotLink);
  html+='<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">';
  if(s.meetLink){
    html+='<a href="'+s.meetLink+'" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:var(--meet-light);color:var(--meet);padding:7px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;text-decoration:none;border:1px solid #c5d9f7">&#128249; Abrir Meet</a>';
  }
  var gcUrl=gcalURL(evTitle,s.date,s.from,s.to,s.meetLink||null);
  html+='<a href="'+gcUrl+'" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#fff8e1;color:#7A5A00;padding:7px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;text-decoration:none;border:1px solid #ffe082">&#128197; Google Calendar</a>';
  html+='<a href="https://wa.me/?text='+waMsg+'" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#d4f4de;color:#1a5c2a;padding:7px 12px;border-radius:var(--rs);font-size:12px;font-weight:500;text-decoration:none;border:1px solid #a8e6bc">&#128232; WhatsApp</a>';
  html+='</div>';
  var mem=s.members||[];
  if(mem.length>0){
    html+='<div class="mls"><div class="mlt">Quienes se unieron</div>';
    for(var i=0;i<mem.length;i++){
      var mb=mem[i],mm=mStyle(mb.email||'');
      var tentTag=mb.tentative?'<span style="font-size:9px;color:var(--orange);border:1px dashed var(--orange);border-radius:3px;padding:0 3px;margin-left:3px">?</span>':'';
      html+='<div class="mrow">'
        +'<div class="mav" style="background:'+mm.c+';'+(mb.tentative?'opacity:.7;':'')+'">'+ini(mb.name)+'</div>'
        +'<div class="min2"><div class="mnm">'+mb.name+tentTag+'</div><div class="mem">'+mb.email+'</div></div>'
        +'<div class="mtm">'+mb.from+'-'+mb.to+(mb.role?' '+rIcon(mb.role):'')+'</div></div>';
    }
    html+='</div>';
  }
  if(!isOwn&&!joined){
    mRole=null;
    var tid=id;
    var tentAlert=s.tentative?'<div class="tent-alert"><span style="font-size:14px">&#9888;</span><span>Esta practica es <strong>tentativa</strong>. El organizador puede cancelarla o cambiar horario.</span></div>':'';
    var jHtml='<div class="jsc"><h4>Sumate a esta practica</h4>'
      +tentAlert
      +'<div class="fg2"><label>Tipo de participacion</label>'
        +'<div class="jtype-row">'
          +'<div class="jtype-opt sel" id="jtype-conf" onclick="selJType(\'confirmed\')"><span class="ri">&#10003;</span>Confirmado</div>'
          +'<div class="jtype-opt" id="jtype-tent" onclick="selJType(\'tentative\')"><span class="ri">?</span>Tentativo</div>'
        +'</div>'
      +'</div>'
      +'<div class="tc" style="margin-bottom:8px">'
        +'<div class="fg2"><label>Desde</label><input type="text" id="jf" placeholder="HH:MM" maxlength="5" value="'+s.from+'"/></div>'
        +'<div class="fg2"><label>Hasta</label><input type="text" id="jt" placeholder="HH:MM" maxlength="5" value="'+s.to+'"/></div>'
      +'</div>'
      +'<div class="fg2"><label>Rol (opcional)</label><div style="margin-top:4px">'+roleHTML('jr',null)+'</div></div>'
      +'<button class="bjoin" id="btn-join-now">Unirme</button></div>';
    html+=jHtml;
    setTimeout(function(){
      var btn=document.getElementById('btn-join-now');
      if(btn) btn.addEventListener('click',function(){joinSlot(tid)});
    },0);
  }else if(joined){
    var me=mem.find(function(m){return m.email===cu.email});
    var meStatus=me&&me.tentative?'(tentativo)':'(confirmado)';
    var meColor=me&&me.tentative?'var(--orange)':'var(--green)';
    var tid3=id;
    html+='<div class="jsc">'
      +'<div style="font-weight:500;font-size:12px;margin-bottom:8px">Participas '+(me?me.from+'-'+me.to:'')
      +' <span style="color:'+meColor+';font-size:10px">'+meStatus+'</span></div>'
      +'<button class="bdng" id="btn-leave-now">Salir de esta practica</button></div>';
    setTimeout(function(){
      var bl=document.getElementById('btn-leave-now');
      if(bl) bl.addEventListener('click',function(){leaveSlot(tid3)});
    },0);
  }else{
    html+='<div class="jsc">'
      +'<button class="bsec" onclick="openEdit(\''+id+'\')">Editar esta franja</button>'
      +'<button class="bdng" onclick="confirmDel(\''+id+'\')">Eliminar esta franja</button></div>';
  }
  document.getElementById('mc2').innerHTML=html;
  document.getElementById('mbg').className='mbg op';
}
window.openSlotMo=openSlotMo;

window.joinSlot=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var fr=document.getElementById('jf').value;
  var to=document.getElementById('jt').value;
  fr=parseTime(fr);to=parseTime(to);if(!fr||!to||fr>=to){showToast('Verifica horario (HH:MM)');return}
  if(fr<s.from||to>s.to){showToast('Debe estar dentro de la franja');return}
  var newMem=(s.members||[]).concat([{name:cu.name,email:cu.email,from:fr,to:to,role:mRole,tentative:joinTentative}]);
  try{
    await updateDoc(doc(db,'slots',id),{members:newMem});
    mRole=null;joinTentative=false;closeMo();
    showToast(joinTentative?'Anotado como tentativo':'Te uniste');
    notifyJoined(s,cu,fr,to,joinTentative);
  }catch(e){showToast('Error: '+e.message)}
};

window.leaveSlot=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var newMem=(s.members||[]).filter(function(m){return m.email!==cu.email});
  try{
    await updateDoc(doc(db,'slots',id),{members:newMem});
    closeMo();showToast('Saliste de la practica');
    notifyLeft(s,cu);
  }catch(e){showToast('Error: '+e.message)}
};

window.closeMo=function(){document.getElementById('mbg').className='mbg'};
window.closeBg=function(e){if(e.target===document.getElementById('mbg'))closeMo()};

// Auto-format time inputs HH:MM as user types
document.addEventListener('input', function(e) {
  if(e.target && e.target.placeholder === 'HH:MM') {
    var v = e.target.value.replace(/[^0-9]/g,'');
    if(v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
    e.target.value = v;
  }
});

function parseTime(v) {
  // Accept HH:MM or HHMM
  v = v.trim();
  if(/^\d{3,4}$/.test(v)) v = v.slice(0,-2)+':'+v.slice(-2);
  if(/^\d{1}:\d{2}$/.test(v)) v = '0'+v;
  return /^\d{2}:\d{2}$/.test(v) ? v : null;
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
