<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachingSync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sand: #F4EFE6; --sand-dark: #E8DFD0;
  --ink: #1A1A18; --ink-soft: #3D3D38; --muted: #8A8A80;
  --white: #FDFCF8;
  --danger: #C0392B; --danger-light: #FADBD8;
  --meet: #1a73e8; --meet-light: #e8f0fe;
  --green: #3D5C40; --green-mid: #7A9E7E; --green-light: #C8DEC9;
  --orange: #C4793A; --orange-dark: #b5682f;
  --radius: 12px; --radius-sm: 6px;
  --hour-h: 56px; --time-col: 50px; --sidebar-w: 272px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }

/* ── LOADING ── */
#loading-screen { position: fixed; inset: 0; background: var(--sand); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
.spinner { width: 34px; height: 34px; border: 3px solid var(--sand-dark); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── HEADER ── */
header { background: var(--ink); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; height: 53px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 19px; color: var(--white); letter-spacing: -0.5px; }
.logo span { color: var(--green-light); }
#user-badge { display: none; align-items: center; gap: 8px; color: var(--green-light); font-size: 12px; }
.hdr-av { width: 29px; height: 29px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--white); flex-shrink: 0; }
#logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--green-light); padding: 3px 10px; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.2s; }
#logout-btn:hover { background: rgba(255,255,255,0.1); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-mid); display: inline-block; }
.sync-dot.syncing { background: var(--orange); animation: pulse 1s infinite; }

/* ── LOGIN ── */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.login-card { background: var(--white); border-radius: 20px; padding: 42px 38px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
.login-card h1 { font-family: 'DM Serif Display', serif; font-size: 27px; color: var(--ink); margin-bottom: 5px; line-height: 1.2; }
.login-card > p { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
.fg { margin-bottom: 13px; }
lbl { display: block; font-size: 10px; font-weight: 500; color: var(--ink-soft); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
input[type="text"], input[type="email"], input[type="time"], input[type="date"], select {
  width: 100%; padding: 9px 11px; border: 1.5px solid var(--sand-dark);
  border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
  font-size: 13px; color: var(--ink); background: var(--white);
  transition: border-color 0.2s; outline: none; -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--green); }
.btn-main { width: 100%; padding: 11px; background: var(--green); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-main:hover { background: var(--green-mid); }
.btn-main:disabled { background: var(--muted); cursor: not-allowed; }
.role-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.role-opt { border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); padding: 9px 6px; text-align: center; cursor: pointer; font-size: 12px; color: var(--muted); transition: all 0.2s; line-height: 1.4; }
.role-opt:hover { border-color: var(--green); color: var(--green); }
.role-opt.sel { border-color: var(--green); background: #EAF2EA; color: var(--green); font-weight: 500; }
.role-opt .ri { font-size: 18px; display: block; }

/* ── APP ── */
#app { display: none; }
.app-layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - 53px); }

/* ── SIDEBAR ── */
.sidebar { background: var(--white); border-right: 1px solid var(--sand-dark); padding: 16px 14px; overflow-y: auto; max-height: calc(100vh - 53px); position: sticky; top: 53px; }
.btn-add { width: 100%; padding: 10px; background: var(--orange); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 14px; }
.btn-add:hover { background: var(--orange-dark); }
.s-section { margin-bottom: 14px; }
.s-sec-title { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.member-chip { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid var(--sand-dark); }
.member-chip:last-child { border-bottom: none; }
.chip-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.chip-name { font-size: 13px; font-weight: 500; flex: 1; }
.chip-role { font-size: 9px; color: var(--muted); background: var(--sand-dark); padding: 2px 5px; border-radius: 8px; }
.my-slot-row { display: flex; align-items: flex-start; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--sand-dark); font-size: 11px; }
.my-slot-row:last-child { border-bottom: none; }
.ms-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }

/* ── CALENDAR ── */
.cal-wrap { padding: 16px 14px; overflow: hidden; }
.cal-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.cal-topbar h2 { font-family: 'DM Serif Display', serif; font-size: 18px; }
.nav-btns { display: flex; gap: 5px; align-items: center; }
.nav-btn { background: var(--white); border: 1.5px solid var(--sand-dark); width: 29px; height: 29px; border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--ink-soft); display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: inherit; }
.nav-btn:hover { border-color: var(--green); color: var(--green); }
.nav-today { width: auto !important; padding: 0 10px !important; border-radius: 16px !important; font-size: 11px !important; }
.hint-click { font-size: 10px; color: var(--muted); font-style: italic; }

.grid-outer { background: var(--white); border-radius: var(--radius); border: 1px solid var(--sand-dark); overflow: hidden; }
.day-headers { display: grid; grid-template-columns: var(--time-col) repeat(7, 1fr); border-bottom: 1.5px solid var(--sand-dark); background: var(--white); position: sticky; top: 53px; z-index: 10; }
.th-empty { border-right: 1px solid var(--sand-dark); }
.day-hdr { padding: 8px 3px; text-align: center; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); border-right: 1px solid var(--sand-dark); }
.day-hdr:last-child { border-right: none; }
.day-hdr .dnum { display: block; font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; color: var(--ink); margin-top: 2px; line-height: 1.1; }
.day-hdr.today .dnum { background: var(--green); color: var(--white); width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; }

.grid-scroll { overflow-y: auto; max-height: calc(100vh - 178px); }
.time-grid { display: grid; grid-template-columns: var(--time-col) repeat(7, 1fr); }
.time-labels { display: flex; flex-direction: column; border-right: 1px solid var(--sand-dark); }
.time-label { height: var(--hour-h); display: flex; align-items: flex-start; justify-content: flex-end; padding: 3px 6px 0 0; font-size: 9px; color: var(--muted); flex-shrink: 0; border-bottom: 1px solid #f0ece3; }
.time-label:last-child { border-bottom: none; }

.day-column { position: relative; border-right: 1px solid var(--sand-dark); }
.day-column:last-child { border-right: none; }
.hour-cell { height: var(--hour-h); border-bottom: 1px solid #f0ece3; cursor: pointer; transition: background 0.12s; position: relative; }
.hour-cell:last-child { border-bottom: none; }
.hour-cell:hover { background: rgba(61,92,64,0.06); }
.hour-cell:hover::after { content: '+'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 15px; color: var(--green); opacity: 0.35; pointer-events: none; }

.slot-block { position: absolute; left: 2px; right: 2px; border-radius: 4px; padding: 3px 5px; cursor: pointer; overflow: hidden; transition: filter 0.15s, transform 0.15s; z-index: 2; }
.slot-block:hover { filter: brightness(0.88); transform: scaleX(0.95); }
.sb-name { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-time { font-size: 9px; white-space: nowrap; opacity: 0.8; }
.sb-extras { font-size: 9px; opacity: 0.7; margin-top: 1px; }

/* ── MODAL ── */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 24px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; position: relative; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 19px; margin-bottom: 3px; padding-right: 22px; }
.modal-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--ink); }
.fg2 { margin-bottom: 11px; }
.fg2 label, lbl2 { display: block; font-size: 10px; font-weight: 500; color: var(--ink-soft); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tz-note { font-size: 10px; color: var(--muted); margin-top: 2px; }
.check-row { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.check-row input { width: auto; accent-color: var(--meet); cursor: pointer; }
.check-row label { text-transform: none; font-size: 12px; letter-spacing: 0; color: var(--ink-soft); cursor: pointer; }
.btn-pub { width: 100%; padding: 11px; background: var(--orange); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 2px; }
.btn-pub:hover { background: var(--orange-dark); }
.btn-pub:disabled { background: var(--muted); cursor: not-allowed; }

.meet-box { background: var(--meet-light); border: 1px solid #c5d9f7; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; }
.meet-box a { color: var(--meet); font-size: 12px; font-weight: 500; text-decoration: none; word-break: break-all; }
.meet-box a:hover { text-decoration: underline; }
.badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }

.mlist { margin-bottom: 12px; }
.ml-title { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.mrow { display: flex; align-items: center; gap: 7px; padding: 5px 0; border-bottom: 1px solid var(--sand-dark); }
.mrow:last-child { border-bottom: none; }
.mav { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: var(--white); flex-shrink: 0; }
.minfo { flex: 1; }
.mname { font-weight: 500; font-size: 12px; }
.memail { font-size: 10px; color: var(--muted); }
.mtime { font-size: 10px; color: var(--muted); white-space: nowrap; }

.join-sec { border-top: 1px solid var(--sand-dark); padding-top: 14px; }
.join-sec h4 { font-size: 12px; font-weight: 500; margin-bottom: 8px; }
.btn-join { width: 100%; padding: 10px; background: var(--green); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-join:hover { background: var(--green-mid); }
.btn-danger { width: 100%; padding: 8px; background: none; color: var(--danger); border: 1.5px solid var(--danger); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
.btn-danger:hover { background: var(--danger-light); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--white); padding: 10px 20px; border-radius: 30px; font-size: 12px; z-index: 999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 720px) {
  :root { --sidebar-w: 0px; --hour-h: 44px; --time-col: 32px; }
  .sidebar { display: none; }
  .app-layout { grid-template-columns: 1fr; }
  .sb-time { display: none; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:12px;color:var(--muted)">Conectando...</span>
</div>

<header>
  <div class="logo">coaching<span>sync</span></div>
  <div id="user-badge">
    <span class="sync-dot" id="sync-dot"></span>
    <div class="hdr-av" id="header-avatar"></div>
    <span id="header-name"></span>
    <button id="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <h1>Bienvenido al<br><em>grupo de práctica</em></h1>
    <p>Ingresá tus datos para ver y gestionar tu disponibilidad</p>
    <div class="fg">
      <lbl>Tu nombre</lbl>
      <input type="text" id="login-name" placeholder="Ej: Romi" />
    </div>
    <div class="fg">
      <lbl>Tu Gmail</lbl>
      <input type="email" id="login-email" placeholder="tu@gmail.com" />
    </div>
    <div class="fg">
      <lbl>Rol <span style="color:var(--muted);font-size:9px;font-weight:400">(opcional)</span></lbl>
      <div class="role-row">
        <div class="role-opt" id="role-coach" onclick="selRole('coach')"><span class="ri">🎯</span>Coach</div>
        <div class="role-opt" id="role-cliente" onclick="selRole('cliente')"><span class="ri">🌱</span>Cliente</div>
      </div>
    </div>
    <button class="btn-main" onclick="doLogin()">Entrar al calendario →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <button class="btn-add" onclick="openCreateModal(null,null)">
        <span style="font-size:15px;line-height:1">+</span> Agregar disponibilidad
      </button>

      <div class="s-section">
        <div class="s-sec-title">Integrantes</div>
        <div id="members-panel"></div>
      </div>

      <div class="s-section">
        <div class="s-sec-title">Mis franjas</div>
        <div id="my-slots-list"><span style="color:var(--muted);font-size:11px">Sin franjas aún.</span></div>
      </div>
    </aside>

    <!-- CALENDAR -->
    <div class="cal-wrap">
      <div class="cal-topbar">
        <h2 id="week-label"></h2>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="hint-click">Clic en cualquier hora para crear una franja</span>
          <div class="nav-btns">
            <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
            <button class="nav-btn nav-today" onclick="changeWeek(0)">Hoy</button>
            <button class="nav-btn" onclick="changeWeek(1)">›</button>
          </div>
        </div>
      </div>

      <div class="grid-outer">
        <div class="day-headers" id="day-headers"><div class="th-empty"></div></div>
        <div class="grid-scroll">
          <div class="time-grid" id="time-grid">
            <div class="time-labels" id="time-labels"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwK4-4o9OR_kqbd8NmF-gfe9QEYhJODzg",
  authDomain: "coaching-calendar-navegantes.firebaseapp.com",
  projectId: "coaching-calendar-navegantes",
  storageBucket: "coaching-calendar-navegantes.firebasestorage.app",
  messagingSenderId: "149753426813",
  appId: "1:149753426813:web:11fb41a68ddbd690e49214"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── MEMBERS ──
const MEMBERS = [
  { key:'coco', name:'Coco', color:'#7B68EE', light:'#EEEAFF' },
  { key:'romi', name:'Romi', color:'#E8793A', light:'#FDEEE4' },
  { key:'milu', name:'Milu', color:'#2E9E75', light:'#D9F3EA' },
  { key:'caro', name:'Caro', color:'#D4527A', light:'#FAE0EA' },
  { key:'dari', name:'Dari', color:'#2A8EC4', light:'#D8EEF9' },
  { key:'fla',  name:'Fla',  color:'#C4A020', light:'#FBF3D0' },
];
const DEF = { color:'#7A9E7E', light:'#C8DEC9' };
function memberStyle(name) {
  if (!name) return DEF;
  const f = name.split(' ')[0].toLowerCase().trim();
  return MEMBERS.find(m => f.startsWith(m.key) || m.key.startsWith(f.slice(0,3))) || DEF;
}

// ── CONSTANTS ──
const HS=7, HE=22, HH=56;
const HOURS = Array.from({length:HE-HS},(_,i)=>HS+i);
const DAYS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const TZLIST = ['America/Argentina/Buenos_Aires','America/Santiago','America/Lima','America/Bogota','America/Mexico_City','America/New_York','America/Los_Angeles','Europe/Madrid','Europe/London','America/Montevideo','America/Sao_Paulo'];

let cu=null, slots=[], wo=0, unsub=null, loginRole=null, modalRole=null;

const pad = n=>String(n).padStart(2,'0');
const fmtD = d=>d.toISOString().split('T')[0];
const isTod = d=>fmtD(d)===fmtD(new Date());
const inits = n=>n.split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');
const t2m = t=>{ const [h,m]=t.split(':').map(Number); return h*60+m; };
const localTz = ()=>{ try { return Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e){return '';} };

function meetLink() {
  const c='abcdefghijklmnopqrstuvwxyz';
  const s=()=>Array.from({length:3},()=>c[~~(Math.random()*c.length)]).join('');
  return `https://meet.google.com/${s()}-${s()}-${s()}`;
}
function weekDays(off) {
  const t=new Date(),dow=t.getDay(),mon=new Date(t);
  mon.setDate(t.getDate()-dow+1+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

// ── INIT ──
const saved=localStorage.getItem('coachingUser');
document.getElementById('loading-screen').style.display='none';
if(saved){cu=JSON.parse(saved);showApp();}
else document.getElementById('login-screen').style.display='flex';

window.selRole = r=>{
  loginRole=r;
  document.getElementById('role-coach').classList.toggle('sel',r==='coach');
  document.getElementById('role-cliente').classList.toggle('sel',r==='cliente');
};
window.doLogin = ()=>{
  const n=document.getElementById('login-name').value.trim();
  const e=document.getElementById('login-email').value.trim();
  if(!n||!e||!e.includes('@')){showToast('Completá nombre y Gmail válido');return;}
  cu={name:n,email:e,role:loginRole,tz:localTz()};
  localStorage.setItem('coachingUser',JSON.stringify(cu));
  document.getElementById('login-screen').style.display='none';
  showApp();
};
window.logout=()=>{
  if(unsub)unsub();cu=null;loginRole=null;
  localStorage.removeItem('coachingUser');
  document.getElementById('app').style.display='none';
  document.getElementById('user-badge').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('role-coach').classList.remove('sel');
  document.getElementById('role-cliente').classList.remove('sel');
};

function showApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('user-badge').style.display='flex';
  document.getElementById('header-name').textContent=cu.name;
  const ms=memberStyle(cu.name);
  const av=document.getElementById('header-avatar');
  av.textContent=inits(cu.name); av.style.background=ms.color;
  buildTimes(); renderMembersPanel(); subscribe();
}

function subscribe(){
  setSyncing(true);
  unsub=onSnapshot(query(collection(db,'slots'),orderBy('date')),snap=>{
    slots=snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncing(false); renderCal(); renderMySlots();
  },err=>{setSyncing(false);showToast('Error de conexión');console.error(err);});
}
function setSyncing(v){
  const d=document.getElementById('sync-dot');
  if(d)d.className='sync-dot'+(v?' syncing':'');
}

function buildTimes(){
  document.getElementById('time-labels').innerHTML=
    HOURS.map(h=>`<div class="time-label">${pad(h)}:00</div>`).join('');
}

function renderMembersPanel(){
  document.getElementById('members-panel').innerHTML=
    MEMBERS.map(m=>`<div class="member-chip">
      <div class="chip-dot" style="background:${m.color}"></div>
      <span class="chip-name">${m.name}</span>
    </div>`).join('');
}

function renderCal(){
  const days=weekDays(wo);
  const f=days[0],l=days[6];
  document.getElementById('week-label').textContent=
    `${f.getDate()} – ${l.getDate()} de ${MONTHS[l.getMonth()]} ${l.getFullYear()}`;

  document.getElementById('day-headers').innerHTML=
    `<div class="th-empty"></div>`+
    days.map(d=>`<div class="day-hdr${isTod(d)?' today':''}">
      <span>${DAYS[d.getDay()]}</span>
      <span class="dnum">${d.getDate()}</span>
    </div>`).join('');

  const grid=document.getElementById('time-grid');
  grid.querySelectorAll('.day-column').forEach(e=>e.remove());
  days.forEach(day=>{
    const ds=fmtD(day), col=document.createElement('div');
    col.className='day-column';
    HOURS.forEach(h=>{
      const c=document.createElement('div');
      c.className='hour-cell';
      c.addEventListener('click',()=>openCreateModal(ds,h));
      col.appendChild(c);
    });
    slots.filter(s=>s.date===ds).forEach(s=>col.appendChild(mkBlock(s)));
    grid.appendChild(col);
  });
}

function mkBlock(s){
  const isOwn=s.owner.email===cu.email;
  const joined=(s.members||[]).some(m=>m.email===cu.email);
  const ms=memberStyle(s.owner.name);
  const top=((t2m(s.from)-HS*60)/60)*HH;
  const h=Math.max(((t2m(s.to)-t2m(s.from))/60)*HH,18);
  const b=document.createElement('div');
  b.className='slot-block';
  b.style.cssText=`top:${top}px;height:${h}px;background:${ms.light};border-left:3px solid ${ms.color};`;
  if(joined&&!isOwn) b.style.outline=`2px solid ${ms.color}`;
  const role=s.role?`<div class="sb-extras">${s.role==='coach'?'🎯':'🌱'} ${s.role}</div>`:'';
  b.innerHTML=`
    <div class="sb-name" style="color:${ms.color}">${s.owner.name.split(' ')[0]}${isOwn?' ·yo':joined?' ·unido':''}</div>
    <div class="sb-time" style="color:${ms.color}">${s.from}–${s.to}</div>
    ${role}${s.meetLink?'<div class="sb-extras" style="color:#1a73e8">▶ Meet</div>':''}`;
  b.addEventListener('click',e=>{e.stopPropagation();openSlotModal(s.id);});
  return b;
}

window.changeWeek=dir=>{wo=dir===0?0:wo+dir;renderCal();};

function renderMySlots(){
  const el=document.getElementById('my-slots-list');
  const mine=slots.filter(s=>s.owner.email===cu.email).sort((a,b)=>a.date.localeCompare(b.date));
  if(!mine.length){el.innerHTML='<span style="color:var(--muted);font-size:11px">Sin franjas aún.</span>';return;}
  const ms=memberStyle(cu.name);
  el.innerHTML=mine.map(s=>{
    const d=new Date(s.date+'T12:00:00');
    return `<div class="my-slot-row">
      <div class="ms-dot" style="background:${ms.color}"></div>
      <div>
        <strong>${DAYS[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</strong>
        <span style="color:var(--muted)"> ${s.from}–${s.to}</span>
        <span style="color:${ms.color}"> (${(s.members||[]).length})</span>
      </div>
    </div>`;
  }).join('');
}

// ── CREATE MODAL ──
function openCreateModal(dateStr,hour){
  const def=fmtD(new Date());
  const ds=dateStr||def;
  const fv=hour!=null?`${pad(hour)}:00`:'';
  const tv=hour!=null?`${pad(Math.min(hour+1,HE))}:00`:'';
  const tz=localTz();
  const tzOpts=TZLIST.map(z=>`<option value="${z}"${z===tz?' selected':''}>${z.replace(/_/g,' ')}</option>`).join('');

  document.getElementById('modal-content').innerHTML=`
    <h3>Agregar disponibilidad</h3>
    <div class="fg2"><label>Fecha</label><input type="date" id="cf-date" value="${ds}"/></div>
    <div class="two-col" style="margin-bottom:11px">
      <div class="fg2"><label>Desde</label><input type="time" id="cf-from" value="${fv}"/></div>
      <div class="fg2"><label>Hasta</label><input type="time" id="cf-to" value="${tv}"/></div>
    </div>
    <div class="fg2">
      <label>Zona horaria</label>
      <select id="cf-tz">${tzOpts}</select>
      <div class="tz-note">Detectada: ${tz||'desconocida'}</div>
    </div>
    <div class="fg2"><label>Nota opcional</label><input type="text" id="cf-note" placeholder="Ej: disponible por Zoom"/></div>
    <div class="fg2">
      <label>Rol <span style="color:var(--muted);font-size:9px">(opcional)</span></label>
      <div class="role-row" style="margin-top:4px">
        <div class="role-opt" id="mf-coach" onclick="selModalRole('coach')"><span class="ri">🎯</span>Coach</div>
        <div class="role-opt" id="mf-cliente" onclick="selModalRole('cliente')"><span class="ri">🌱</span>Cliente</div>
      </div>
    </div>
    <div class="check-row">
      <input type="checkbox" id="cf-meet" checked/>
      <label for="cf-meet">Generar enlace de Google Meet</label>
    </div>
    <button class="btn-pub" id="cf-btn" onclick="doCreate()">Publicar franja horaria</button>`;
  document.getElementById('modal-bg').classList.add('open');
  if(cu.role) selModalRole(cu.role);
}
window.openCreateModal=openCreateModal;

window.selModalRole=r=>{
  modalRole=r;
  document.getElementById('mf-coach')?.classList.toggle('sel',r==='coach');
  document.getElementById('mf-cliente')?.classList.toggle('sel',r==='cliente');
};

window.doCreate=async()=>{
  const ds=document.getElementById('cf-date').value;
  const fr=document.getElementById('cf-from').value;
  const to=document.getElementById('cf-to').value;
  const note=document.getElementById('cf-note').value.trim();
  const tz=document.getElementById('cf-tz').value;
  const wm=document.getElementById('cf-meet').checked;
  if(!ds||!fr||!to||fr>=to){showToast('Completá fecha y horario válido');return;}
  const btn=document.getElementById('cf-btn');
  btn.disabled=true;btn.textContent='Publicando...';
  try{
    await addDoc(collection(db,'slots'),{
      owner:{name:cu.name,email:cu.email},
      date:ds,from:fr,to,note,tz,
      role:modalRole||cu.role||null,
      meetLink:wm?meetLink():null,
      members:[],createdAt:Date.now()
    });
    modalRole=null;closeModal();
    showToast('✓ Franja publicada'+(wm?' con Meet':''));
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Publicar franja horaria';}
};

// ── SLOT MODAL ──
function openSlotModal(id){
  const s=slots.find(x=>x.id===id);if(!s)return;
  const isOwn=s.owner.email===cu.email;
  const joined=(s.members||[]).some(m=>m.email===cu.email);
  const ms=memberStyle(s.owner.name);
  const do_=new Date(s.date+'T12:00:00');
  const dl=`${DAYS[do_.getDay()]} ${do_.getDate()} de ${MONTHS[do_.getMonth()]}`;
  const roleB=s.role?`<span class="badge" style="background:${ms.light};color:${ms.color}">${s.role==='coach'?'🎯 Coach':'🌱 Cliente'}</span>`:'';
  const tzB=s.tz?`<span class="badge" style="background:var(--sand-dark);color:var(--muted)">🌐 ${s.tz.split('/').pop().replace(/_/g,' ')}</span>`:'';
  const meetH=s.meetLink?`<div class="meet-box"><span style="font-size:17px;flex-shrink:0">📹</span><div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Google Meet</div><a href="${s.meetLink}" target="_blank">${s.meetLink}</a></div></div>`:'';
  const membH=(s.members||[]).length?`<div class="mlist"><div class="ml-title">Quienes se unieron</div>${s.members.map(m=>{const mm=memberStyle(m.name);return`<div class="mrow"><div class="mav" style="background:${mm.color}">${inits(m.name)}</div><div class="minfo"><div class="mname">${m.name}</div><div class="memail">${m.email}</div></div><div class="mtime">${m.from}–${m.to}</div></div>`;}).join('')}</div>`:'';
  let act='';
  if(!isOwn&&!joined){
    act=`<div class="join-sec"><h4>Sumate a esta práctica</h4><div class="two-col" style="margin-bottom:8px"><div class="fg2"><label>Desde</label><input type="time" id="jf" value="${s.from}"/></div><div class="fg2"><label>Hasta</label><input type="time" id="jt" value="${s.to}"/></div></div><button class="btn-join" onclick="joinSlot('${id}')">Unirme a esta práctica</button></div>`;
  }else if(joined){
    const me=s.members.find(m=>m.email===cu.email);
    act=`<div class="join-sec"><div style="color:var(--green);font-weight:500;font-size:12px;margin-bottom:8px">✓ Ya estás unido (${me.from}–${me.to})</div><button class="btn-danger" onclick="leaveSlot('${id}')">Salir de esta práctica</button></div>`;
  }else{
    act=`<div class="join-sec"><button class="btn-danger" onclick="deleteSlot('${id}')">Eliminar esta franja</button></div>`;
  }
  document.getElementById('modal-content').innerHTML=`
    <h3 style="color:${ms.color}">${s.owner.name}</h3>
    <div class="modal-meta">${dl} · ${s.from}–${s.to} ${roleB} ${tzB} ${s.note?`<span>· ${s.note}</span>`:''}</div>
    ${meetH}${membH}${act}`;
  document.getElementById('modal-bg').classList.add('open');
}

window.joinSlot=async id=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  const fr=document.getElementById('jf').value,to=document.getElementById('jt').value;
  if(!fr||!to||fr>=to){showToast('Verificá el horario');return;}
  if(fr<s.from||to>s.to){showToast('Debe estar dentro de la franja');return;}
  try{
    await updateDoc(doc(db,'slots',id),{members:[...(s.members||[]),{name:cu.name,email:cu.email,from:fr,to}]});
    closeModal();showToast('✓ Te uniste');sendMail(s,cu,fr,to);
  }catch(e){showToast('Error: '+e.message);}
};
window.leaveSlot=async id=>{
  const s=slots.find(x=>x.id===id);if(!s)return;
  try{await updateDoc(doc(db,'slots',id),{members:(s.members||[]).filter(m=>m.email!==cu.email)});closeModal();showToast('Saliste');}
  catch(e){showToast('Error: '+e.message);}
};
window.deleteSlot=async id=>{
  if(!confirm('¿Eliminar esta franja?'))return;
  try{await deleteDoc(doc(db,'slots',id));closeModal();showToast('Franja eliminada');}
  catch(e){showToast('Error: '+e.message);}
};
window.closeModal=()=>document.getElementById('modal-bg').classList.remove('open');
window.closeModalBg=e=>{if(e.target===document.getElementById('modal-bg'))closeModal();};

function sendMail(slot,joiner,from,to){
  const do_=new Date(slot.date+'T12:00:00');
  const dl=`${DAYS[do_.getDay()]} ${do_.getDate()} de ${MONTHS[do_.getMonth()]}`;
  const meet=slot.meetLink?`\n📹 Meet: ${slot.meetLink}`:'';
  const subj=encodeURIComponent(`${joiner.name} se sumó a tu práctica del ${dl}`);
  const body=encodeURIComponent(`Hola ${slot.owner.name},\n\n${joiner.name} (${joiner.email}) se unió a tu franja.\n\n📅 ${dl}\n🕐 ${from} – ${to}${meet}\n\nPodés responderle para confirmar.\n\n---\nCoachingSync`);
  window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(slot.owner.email)}&su=${subj}&body=${body}`,'_blank');
  showToast('✉ Gmail abierto');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
