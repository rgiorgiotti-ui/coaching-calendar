<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachingSync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage: #7A9E7E; --sage-light: #C8DEC9; --sage-dark: #3D5C40;
  --sand: #F4EFE6; --sand-dark: #E8DFD0;
  --ink: #1A1A18; --ink-soft: #3D3D38; --muted: #8A8A80;
  --white: #FDFCF8; --accent: #C4793A; --accent-light: #F2E4D4;
  --danger: #C0392B; --danger-light: #FADBD8;
  --meet: #1a73e8; --meet-light: #e8f0fe;
  --radius: 12px; --radius-sm: 6px;
  --hour-h: 56px;
  --time-col: 52px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; }

#loading-screen { position: fixed; inset: 0; background: var(--sand); display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--sand-dark); border-top-color: var(--sage-dark); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

header { background: var(--ink); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--white); letter-spacing: -0.5px; }
.logo span { color: var(--sage-light); }
#user-badge { display: none; align-items: center; gap: 10px; color: var(--sand-dark); font-size: 13px; }
.hdr-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--sage-dark); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--white); flex-shrink: 0; }
#logout-btn { background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--sand-dark); padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
#logout-btn:hover { background: rgba(255,255,255,0.1); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sage); display: inline-block; }
.sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
.login-card { background: var(--white); border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); }
.login-card h1 { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); margin-bottom: 6px; line-height: 1.15; }
.login-card p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 11px; font-weight: 500; color: var(--ink-soft); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
input[type="text"], input[type="email"], input[type="time"], input[type="date"] { width: 100%; padding: 10px 13px; border: 1.5px solid var(--sand-dark); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--ink); background: var(--white); transition: border-color 0.2s; outline: none; }
input:focus { border-color: var(--sage); }
.btn-primary { width: 100%; padding: 12px; background: var(--sage-dark); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-primary:hover { background: var(--sage); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; }

#app { display: none; }
.app-wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
.cal-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
.cal-topbar h2 { font-family: 'DM Serif Display', serif; font-size: 20px; }
.nav-btns { display: flex; gap: 6px; }
.nav-btn { background: var(--white); border: 1.5px solid var(--sand-dark); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; color: var(--ink-soft); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.nav-btn:hover { border-color: var(--sage); color: var(--sage-dark); }
.nav-btn-today { width: auto !important; padding: 0 12px !important; border-radius: 20px !important; font-size: 12px !important; }
.hint-click { font-size: 11px; color: var(--muted); font-style: italic; }

.grid-outer { background: var(--white); border-radius: var(--radius); border: 1px solid var(--sand-dark); overflow: hidden; }
.day-headers { display: grid; grid-template-columns: var(--time-col) repeat(7, 1fr); border-bottom: 1.5px solid var(--sand-dark); background: var(--white); position: sticky; top: 53px; z-index: 10; }
.th-empty { border-right: 1px solid var(--sand-dark); }
.day-hdr { padding: 10px 4px; text-align: center; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; color: var(--muted); border-right: 1px solid var(--sand-dark); }
.day-hdr:last-child { border-right: none; }
.day-hdr .dnum { display: block; font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; color: var(--ink); margin-top: 2px; line-height: 1; }
.day-hdr.today .dnum { background: var(--sage-dark); color: var(--white); width: 30px; height: 30px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }

.grid-scroll { overflow-y: auto; max-height: calc(100vh - 175px); }
.time-grid { display: grid; grid-template-columns: var(--time-col) repeat(7, 1fr); }
.time-labels { display: flex; flex-direction: column; border-right: 1px solid var(--sand-dark); }
.time-label { height: var(--hour-h); display: flex; align-items: flex-start; justify-content: flex-end; padding: 4px 8px 0 0; font-size: 10px; color: var(--muted); font-weight: 500; flex-shrink: 0; border-bottom: 1px solid #f0ece3; }
.time-label:last-child { border-bottom: none; }

.day-column { position: relative; border-right: 1px solid var(--sand-dark); }
.day-column:last-child { border-right: none; }
.hour-cell { height: var(--hour-h); border-bottom: 1px solid #f0ece3; cursor: pointer; transition: background 0.15s; position: relative; }
.hour-cell:last-child { border-bottom: none; }
.hour-cell:hover { background: rgba(122,158,126,0.09); }
.hour-cell:hover::after { content: '+'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 18px; color: var(--sage); opacity: 0.45; pointer-events: none; }

.slot-block { position: absolute; left: 3px; right: 3px; border-radius: 5px; padding: 4px 7px; cursor: pointer; overflow: hidden; transition: filter 0.15s, transform 0.15s; z-index: 2; background: var(--sage-light); border-left: 3px solid var(--sage-dark); }
.slot-block:hover { filter: brightness(0.92); transform: scaleX(0.96); }
.slot-block.own { background: var(--accent-light); border-left-color: var(--accent); }
.slot-block.joined { background: var(--meet-light); border-left-color: var(--meet); }
.sb-name { font-size: 10px; font-weight: 600; color: var(--sage-dark); text-transform: uppercase; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-block.own .sb-name { color: var(--accent); }
.slot-block.joined .sb-name { color: var(--meet); }
.sb-time { font-size: 10px; color: var(--ink-soft); white-space: nowrap; }
.sb-meet { font-size: 9px; color: var(--meet); margin-top: 2px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-bg.open { display: flex; }
.modal { background: var(--white); border-radius: 16px; padding: 28px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; position: relative; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 21px; margin-bottom: 4px; padding-right: 24px; }
.modal-meta { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; }
.modal-close:hover { color: var(--ink); }

.meet-box { background: var(--meet-light); border: 1px solid #c5d9f7; border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 18px; display: flex; align-items: flex-start; gap: 10px; }
.meet-box a { color: var(--meet); font-size: 13px; font-weight: 500; text-decoration: none; word-break: break-all; }
.meet-box a:hover { text-decoration: underline; }

.time-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.btn-create { width: 100%; padding: 12px; background: var(--accent); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-create:hover { background: #b5682f; }
.btn-create:disabled { background: var(--muted); cursor: not-allowed; }

.members-list { margin-bottom: 16px; }
.members-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.member-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--sand-dark); }
.member-row:last-child { border-bottom: none; }
.member-av { width: 28px; height: 28px; border-radius: 50%; background: var(--sage-light); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--sage-dark); flex-shrink: 0; }
.member-info { flex: 1; }
.member-name { font-weight: 500; font-size: 13px; }
.member-email { font-size: 11px; color: var(--muted); }
.member-time { font-size: 11px; color: var(--muted); white-space: nowrap; }

.join-section { border-top: 1px solid var(--sand-dark); padding-top: 16px; }
.join-section h4 { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
.join-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.btn-join { width: 100%; padding: 11px; background: var(--sage-dark); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-join:hover { background: var(--sage); }
.btn-danger { width: 100%; padding: 9px; background: none; color: var(--danger); border: 1.5px solid var(--danger); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
.btn-danger:hover { background: var(--danger-light); }

#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: var(--white); padding: 11px 22px; border-radius: 30px; font-size: 13px; z-index: 999; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); }

.legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); flex-wrap: wrap; align-items: center; margin-top: 12px; }
.ldot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; }

@media (max-width: 680px) {
  :root { --hour-h: 44px; --time-col: 34px; }
  .day-hdr { font-size: 9px; padding: 6px 2px; }
  .day-hdr .dnum { font-size: 14px; }
  .sb-time { display: none; }
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--muted)">Conectando...</span>
</div>

<header>
  <div class="logo">coaching<span>sync</span></div>
  <div id="user-badge">
    <span class="sync-dot" id="sync-dot"></span>
    <div class="hdr-avatar" id="header-avatar"></div>
    <span id="header-name"></span>
    <button id="logout-btn" onclick="logout()">Salir</button>
  </div>
</header>

<div id="login-screen" style="display:none">
  <div class="login-card">
    <h1>Bienvenido al<br><em>grupo de práctica</em></h1>
    <p>Ingresá tu nombre y Gmail para ver y gestionar tu disponibilidad</p>
    <div class="form-group">
      <label>Tu nombre</label>
      <input type="text" id="login-name" placeholder="Ej: María González" />
    </div>
    <div class="form-group">
      <label>Tu Gmail</label>
      <input type="email" id="login-email" placeholder="tu@gmail.com" />
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar al calendario →</button>
  </div>
</div>

<div id="app">
  <div class="app-wrap">
    <div class="cal-topbar">
      <h2 id="week-label"></h2>
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <span class="hint-click">Clic en cualquier hora para crear una franja</span>
        <div class="nav-btns">
          <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
          <button class="nav-btn nav-btn-today" onclick="changeWeek(0)">Hoy</button>
          <button class="nav-btn" onclick="changeWeek(1)">›</button>
        </div>
      </div>
    </div>

    <div class="grid-outer">
      <div class="day-headers" id="day-headers">
        <div class="th-empty"></div>
      </div>
      <div class="grid-scroll">
        <div class="time-grid" id="time-grid">
          <div class="time-labels" id="time-labels"></div>
        </div>
      </div>
    </div>

    <div class="legend">
      <span><span class="ldot" style="background:var(--sage-light);border-left:3px solid var(--sage-dark)"></span>Disponibilidad de otros</span>
      <span><span class="ldot" style="background:var(--accent-light);border-left:3px solid var(--accent)"></span>Mi disponibilidad</span>
      <span><span class="ldot" style="background:var(--meet-light);border-left:3px solid var(--meet)"></span>Unido con Meet</span>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwK4-4o9OR_kqbd8NmF-gfe9QEYhJODzg",
  authDomain: "coaching-calendar-navegantes.firebaseapp.com",
  projectId: "coaching-calendar-navegantes",
  storageBucket: "coaching-calendar-navegantes.firebasestorage.app",
  messagingSenderId: "149753426813",
  appId: "1:149753426813:web:11fb41a68ddbd690e49214"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const HOUR_START = 7, HOUR_END = 22;
const HOURS = Array.from({length: HOUR_END - HOUR_START}, (_,i) => HOUR_START + i);
const HOUR_H = 56; // px — must match --hour-h
const DAYS_ES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let currentUser = null, slots = [], weekOffset = 0, unsubscribe = null;

const pad = n => String(n).padStart(2,'0');
const fmtDate = d => d.toISOString().split('T')[0];
const isToday = d => fmtDate(d) === fmtDate(new Date());
const initials = name => name.split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join('');
const timeToMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };

function generateMeetLink() {
  const c='abcdefghijklmnopqrstuvwxyz';
  const s=()=>Array.from({length:3},()=>c[Math.floor(Math.random()*c.length)]).join('');
  return `https://meet.google.com/${s()}-${s()}-${s()}`;
}

function getWeekDays(off) {
  const t=new Date(), dow=t.getDay();
  const mon=new Date(t); mon.setDate(t.getDate()-dow+1+off*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

// ── INIT ──
const saved = localStorage.getItem('coachingUser');
document.getElementById('loading-screen').style.display = 'none';
if (saved) { currentUser = JSON.parse(saved); showApp(); }
else document.getElementById('login-screen').style.display = 'flex';

window.doLogin = () => {
  const name = document.getElementById('login-name').value.trim();
  const email = document.getElementById('login-email').value.trim();
  if (!name||!email||!email.includes('@')) { showToast('Completá nombre y Gmail válido'); return; }
  currentUser = {name,email};
  localStorage.setItem('coachingUser', JSON.stringify(currentUser));
  document.getElementById('login-screen').style.display = 'none';
  showApp();
};

window.logout = () => {
  if (unsubscribe) unsubscribe();
  currentUser = null;
  localStorage.removeItem('coachingUser');
  document.getElementById('app').style.display = 'none';
  document.getElementById('user-badge').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
};

function showApp() {
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('header-name').textContent = currentUser.name;
  document.getElementById('header-avatar').textContent = initials(currentUser.name);
  buildTimeLabels();
  subscribeToSlots();
}

function subscribeToSlots() {
  setSyncing(true);
  unsubscribe = onSnapshot(query(collection(db,'slots'),orderBy('date')), snap => {
    slots = snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncing(false);
    renderCalendar();
  }, err => { setSyncing(false); showToast('Error de conexión'); console.error(err); });
}

function setSyncing(v) {
  const d=document.getElementById('sync-dot');
  if(d) d.className='sync-dot'+(v?' syncing':'');
}

function buildTimeLabels() {
  document.getElementById('time-labels').innerHTML =
    HOURS.map(h=>`<div class="time-label">${pad(h)}:00</div>`).join('');
}

function renderCalendar() {
  const days = getWeekDays(weekOffset);
  const first=days[0], last=days[6];
  document.getElementById('week-label').textContent =
    `${first.getDate()} – ${last.getDate()} de ${MONTHS_ES[last.getMonth()]} ${last.getFullYear()}`;

  document.getElementById('day-headers').innerHTML =
    `<div class="th-empty"></div>` +
    days.map(d=>`<div class="day-hdr${isToday(d)?' today':''}">
      <span>${DAYS_ES[d.getDay()]}</span>
      <span class="dnum">${d.getDate()}</span>
    </div>`).join('');

  const grid = document.getElementById('time-grid');
  grid.querySelectorAll('.day-column').forEach(el=>el.remove());

  days.forEach(day => {
    const dateStr = fmtDate(day);
    const col = document.createElement('div');
    col.className = 'day-column';

    HOURS.forEach(h => {
      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.addEventListener('click', ()=>openCreateModal(dateStr, h));
      col.appendChild(cell);
    });

    slots.filter(s=>s.date===dateStr).forEach(s=>{
      col.appendChild(buildSlotBlock(s));
    });

    grid.appendChild(col);
  });
}

function buildSlotBlock(s) {
  const isOwn = s.owner.email===currentUser.email;
  const joined = (s.members||[]).some(m=>m.email===currentUser.email);
  const startMin = timeToMin(s.from) - HOUR_START*60;
  const endMin   = timeToMin(s.to)   - HOUR_START*60;
  const top    = (startMin/60)*HOUR_H;
  const height = Math.max(((endMin-startMin)/60)*HOUR_H, 18);

  const block = document.createElement('div');
  block.className = 'slot-block'+(isOwn?' own':(joined?' joined':''));
  block.style.cssText = `top:${top}px;height:${height}px`;
  block.innerHTML = `
    <div class="sb-name">${s.owner.name.split(' ')[0]}${isOwn?' ·yo':joined?' ·unido':''}</div>
    <div class="sb-time">${s.from}–${s.to}</div>
    ${s.meetLink?'<div class="sb-meet">▶ Meet</div>':''}`;
  block.addEventListener('click', e=>{ e.stopPropagation(); openSlotModal(s.id); });
  return block;
}

window.changeWeek = dir => { weekOffset = dir===0?0:weekOffset+dir; renderCalendar(); };

// ── CREATE MODAL ──
function openCreateModal(dateStr, hour) {
  const dateObj = new Date(dateStr+'T12:00:00');
  const dateLabel = `${DAYS_ES[dateObj.getDay()]} ${dateObj.getDate()} de ${MONTHS_ES[dateObj.getMonth()]}`;
  const fromVal = `${pad(hour)}:00`;
  const toVal   = `${pad(Math.min(hour+1,HOUR_END))}:00`;

  document.getElementById('modal-content').innerHTML = `
    <h3>Nueva franja</h3>
    <div class="modal-meta">${dateLabel}</div>
    <div class="time-row-grid">
      <div class="form-group"><label>Desde</label><input type="time" id="cf-from" value="${fromVal}"/></div>
      <div class="form-group"><label>Hasta</label><input type="time" id="cf-to" value="${toVal}"/></div>
    </div>
    <div class="form-group"><label>Nota opcional</label><input type="text" id="cf-note" placeholder="Ej: disponible por Zoom"/></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <input type="checkbox" id="cf-meet" checked style="width:auto;accent-color:var(--meet);cursor:pointer"/>
      <label for="cf-meet" style="text-transform:none;font-size:13px;letter-spacing:0;color:var(--ink-soft);cursor:pointer">Generar enlace de Google Meet</label>
    </div>
    <button class="btn-create" id="cf-btn" onclick="doCreateSlot('${dateStr}')">Publicar franja horaria</button>`;
  document.getElementById('modal-bg').classList.add('open');
}

window.doCreateSlot = async dateStr => {
  const from = document.getElementById('cf-from').value;
  const to   = document.getElementById('cf-to').value;
  const note = document.getElementById('cf-note').value.trim();
  const withMeet = document.getElementById('cf-meet').checked;
  if (!from||!to||from>=to) { showToast('Verificá el horario'); return; }
  const btn = document.getElementById('cf-btn');
  btn.disabled=true; btn.textContent='Publicando...';
  try {
    await addDoc(collection(db,'slots'), {
      owner:{name:currentUser.name,email:currentUser.email},
      date:dateStr, from, to, note,
      meetLink: withMeet ? generateMeetLink() : null,
      members:[], createdAt:Date.now()
    });
    closeModal();
    showToast('✓ Franja publicada'+(withMeet?' con enlace Meet':''));
  } catch(e) { showToast('Error: '+e.message); btn.disabled=false; btn.textContent='Publicar franja horaria'; }
};

// ── SLOT DETAIL MODAL ──
function openSlotModal(id) {
  const s = slots.find(x=>x.id===id);
  if (!s) return;
  const isOwn = s.owner.email===currentUser.email;
  const joined = (s.members||[]).some(m=>m.email===currentUser.email);
  const dateObj = new Date(s.date+'T12:00:00');
  const dateLabel = `${DAYS_ES[dateObj.getDay()]} ${dateObj.getDate()} de ${MONTHS_ES[dateObj.getMonth()]}`;

  const meetHtml = s.meetLink ? `
    <div class="meet-box">
      <span style="font-size:20px;flex-shrink:0">📹</span>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Enlace de Google Meet</div>
        <a href="${s.meetLink}" target="_blank">${s.meetLink}</a>
      </div>
    </div>` : '';

  const membersHtml = (s.members||[]).length ? `
    <div class="members-list">
      <div class="members-title">Quienes se unieron</div>
      ${s.members.map(m=>`
        <div class="member-row">
          <div class="member-av">${initials(m.name)}</div>
          <div class="member-info"><div class="member-name">${m.name}</div><div class="member-email">${m.email}</div></div>
          <div class="member-time">${m.from}–${m.to}</div>
        </div>`).join('')}
    </div>` : '';

  let actionHtml = '';
  if (!isOwn && !joined) {
    actionHtml = `<div class="join-section">
      <h4>Sumate a esta práctica</h4>
      <div class="join-time-row">
        <div class="form-group"><label>Desde</label><input type="time" id="jf" value="${s.from}"/></div>
        <div class="form-group"><label>Hasta</label><input type="time" id="jt" value="${s.to}"/></div>
      </div>
      <button class="btn-join" onclick="joinSlot('${id}')">Unirme a esta práctica</button>
    </div>`;
  } else if (joined) {
    const me = s.members.find(m=>m.email===currentUser.email);
    actionHtml = `<div class="join-section">
      <div style="color:var(--sage-dark);font-weight:500;font-size:13px;margin-bottom:8px">✓ Ya estás unido (${me.from}–${me.to})</div>
      <button class="btn-danger" onclick="leaveSlot('${id}')">Salir de esta práctica</button>
    </div>`;
  } else {
    actionHtml = `<div class="join-section">
      <button class="btn-danger" onclick="deleteSlot('${id}')">Eliminar esta franja</button>
    </div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <h3>${s.owner.name}</h3>
    <div class="modal-meta">${dateLabel} · ${s.from} – ${s.to}${s.note?' · '+s.note:''}</div>
    ${meetHtml}${membersHtml}${actionHtml}`;
  document.getElementById('modal-bg').classList.add('open');
}

window.joinSlot = async id => {
  const s=slots.find(x=>x.id===id);
  if(!s) return;
  const from=document.getElementById('jf').value, to=document.getElementById('jt').value;
  if(!from||!to||from>=to){showToast('Verificá el horario');return;}
  if(from<s.from||to>s.to){showToast('Debe estar dentro de la franja disponible');return;}
  try {
    await updateDoc(doc(db,'slots',id),{members:[...(s.members||[]),{name:currentUser.name,email:currentUser.email,from,to}]});
    closeModal(); showToast('✓ Te uniste a la práctica');
    sendEmailNotification(s,currentUser,from,to);
  } catch(e){showToast('Error: '+e.message);}
};

window.leaveSlot = async id => {
  const s=slots.find(x=>x.id===id);
  if(!s) return;
  try {
    await updateDoc(doc(db,'slots',id),{members:(s.members||[]).filter(m=>m.email!==currentUser.email)});
    closeModal(); showToast('Saliste de la práctica');
  } catch(e){showToast('Error: '+e.message);}
};

window.deleteSlot = async id => {
  if(!confirm('¿Eliminar esta franja?')) return;
  try { await deleteDoc(doc(db,'slots',id)); closeModal(); showToast('Franja eliminada'); }
  catch(e){showToast('Error: '+e.message);}
};

window.closeModal = ()=>document.getElementById('modal-bg').classList.remove('open');
window.closeModalBg = e=>{ if(e.target===document.getElementById('modal-bg')) closeModal(); };

function sendEmailNotification(slot,joiner,from,to){
  const dateObj=new Date(slot.date+'T12:00:00');
  const dateLabel=`${DAYS_ES[dateObj.getDay()]} ${dateObj.getDate()} de ${MONTHS_ES[dateObj.getMonth()]}`;
  const meet=slot.meetLink?`\n📹 Meet: ${slot.meetLink}`:'';
  const subject=encodeURIComponent(`${joiner.name} se sumó a tu práctica del ${dateLabel}`);
  const body=encodeURIComponent(`Hola ${slot.owner.name},\n\n${joiner.name} (${joiner.email}) se unió a tu franja de práctica.\n\n📅 Día: ${dateLabel}\n🕐 Horario: ${from} – ${to}${meet}\n\nPodés responderle directamente para confirmar.\n\n---\nCoachingSync`);
  window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(slot.owner.email)}&su=${subject}&body=${body}`,'_blank');
  showToast('✉ Se abre Gmail con el mensaje listo');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
