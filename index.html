<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachingSync</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sand:#F4EFE6;--sand-dark:#E8DFD0;
  --ink:#1A1A18;--ink-soft:#3D3D38;--muted:#8A8A80;
  --white:#FDFCF8;
  --danger:#C0392B;--danger-light:#FADBD8;
  --meet:#1a73e8;--meet-light:#e8f0fe;
  --green:#3D5C40;--green-mid:#7A9E7E;--green-light:#C8DEC9;
  --orange:#C4793A;--orange-dk:#b5682f;
  --r:12px;--rs:6px;--HH:56px;--TC:50px;--SW:272px;
}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh}
#ls{position:fixed;inset:0;background:var(--sand);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.spin{width:34px;height:34px;border:3px solid var(--sand-dark);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
header{background:var(--ink);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;height:53px}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:var(--white);letter-spacing:-.5px}
.logo span{color:var(--green-light)}
#ub{display:none;align-items:center;gap:8px;color:var(--green-light);font-size:12px}
.hav{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--white);flex-shrink:0}
#lob{background:none;border:1px solid rgba(255,255,255,.2);color:var(--green-light);padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-family:inherit}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green-mid);display:inline-block}
.sdot.sy{background:var(--orange);animation:pulse 1s infinite}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.lcard{background:var(--white);border-radius:20px;padding:42px 38px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.lcard h1{font-family:'DM Serif Display',serif;font-size:27px;margin-bottom:5px;line-height:1.2}
.lcard>p{color:var(--muted);font-size:13px;margin-bottom:22px}
.fg{margin-bottom:13px}
.lb{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
input[type=text],input[type=email],input[type=time],input[type=date],select{width:100%;padding:9px 11px;border:1.5px solid var(--sand-dark);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--white);transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--green)}
.bmain{width:100%;padding:11px;background:var(--green);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.bmain:hover{background:var(--green-mid)}
.bmain:disabled{background:var(--muted);cursor:not-allowed}
.remrow{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.remrow input{width:auto;accent-color:var(--green);cursor:pointer}
.remrow label{font-size:12px;color:var(--ink-soft);cursor:pointer}
.lerr{font-size:12px;color:var(--danger);background:var(--danger-light);padding:8px 10px;border-radius:var(--rs);margin-bottom:12px;display:none}
.rrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.ropt{border:1.5px solid var(--sand-dark);border-radius:var(--rs);padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .2s;line-height:1.4}
.ropt:hover{border-color:var(--green);color:var(--green)}
.ropt.sel{border-color:var(--green);background:#EAF2EA;color:var(--green);font-weight:500}
.ropt .ri{font-size:16px;display:block}
#app{display:none}
.al{display:grid;grid-template-columns:var(--SW) 1fr;min-height:calc(100vh - 53px)}
.sb{background:var(--white);border-right:1px solid var(--sand-dark);padding:16px 14px;overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px}
.badd{width:100%;padding:10px;background:var(--orange);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:14px}
.badd:hover{background:var(--orange-dk)}
.stit{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ssec{margin-bottom:14px}
.mchip{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.mchip:last-child{border-bottom:none}
.cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.msr{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--sand-dark);font-size:11px;cursor:pointer}
.msr:hover{background:var(--sand)}
.msr:last-child{border-bottom:none}
.msd{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.cw{padding:16px 14px;overflow:hidden}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ctop h2{font-family:'DM Serif Display',serif;font-size:18px}
.nbts{display:flex;gap:5px;align-items:center}
.nb{background:var(--white);border:1.5px solid var(--sand-dark);width:29px;height:29px;border-radius:50%;cursor:pointer;font-size:14px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.nb:hover{border-color:var(--green);color:var(--green)}
.nbt{width:auto!important;padding:0 10px!important;border-radius:16px!important;font-size:11px!important}
.tzb{font-size:11px;color:var(--green);background:var(--green-light);padding:4px 10px;border-radius:20px}
.hc{font-size:10px;color:var(--muted);font-style:italic}
.go{background:var(--white);border-radius:var(--r);border:1px solid var(--sand-dark);overflow:hidden}
.dh{display:grid;grid-template-columns:var(--TC) repeat(7,1fr);border-bottom:1.5px solid var(--sand-dark);background:var(--white);position:sticky;top:53px;z-index:10}
.the{border-right:1px solid var(--sand-dark)}
.dhd{padding:8px 3px;text-align:center;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-right:1px solid var(--sand-dark)}
.dhd:last-child{border-right:none}
.dhd .dn{display:block;font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;color:var(--ink);margin-top:2px;line-height:1.1}
.dhd.tod .dn{background:var(--green);color:var(--white);width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.gs{overflow-y:auto;max-height:calc(100vh - 185px)}
.tg{display:grid;grid-template-columns:var(--TC) repeat(7,1fr)}
.tls{display:flex;flex-direction:column;border-right:1px solid var(--sand-dark)}
.tl{height:var(--HH);display:flex;align-items:flex-start;justify-content:flex-end;padding:3px 6px 0 0;font-size:9px;color:var(--muted);flex-shrink:0;border-bottom:1px solid #f0ece3}
.tl:last-child{border-bottom:none}
.dc{position:relative;border-right:1px solid var(--sand-dark)}
.dc:last-child{border-right:none}
.hcl{height:var(--HH);border-bottom:1px solid #f0ece3;cursor:pointer;transition:background .12s;position:relative}
.hcl:last-child{border-bottom:none}
.hcl:hover{background:rgba(61,92,64,.06)}
.hcl:hover::after{content:'+';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;color:var(--green);opacity:.35;pointer-events:none}
.sb2{position:absolute;left:2px;right:2px;border-radius:4px;padding:3px 5px;cursor:pointer;overflow:hidden;transition:filter .15s,transform .15s;z-index:2}
.sb2:hover{filter:brightness(.88);transform:scaleX(.95)}
.sbn{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbt{font-size:9px;white-space:nowrap;opacity:.8}
.sbe{font-size:9px;opacity:.7;margin-top:1px}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.mbg.op{display:flex}
.mo{background:var(--white);border-radius:16px;padding:24px;width:100%;max-width:450px;max-height:90vh;overflow-y:auto;position:relative}
.mo h3{font-family:'DM Serif Display',serif;font-size:19px;margin-bottom:3px;padding-right:22px}
.mme{font-size:12px;color:var(--muted);margin-bottom:14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mc{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.mc:hover{color:var(--ink)}
.fg2{margin-bottom:11px}
.fg2 label{display:block;font-size:10px;font-weight:500;color:var(--ink-soft);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tzn{font-size:10px;color:var(--muted);margin-top:2px}
.ckr{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ckr input{width:auto;accent-color:var(--meet);cursor:pointer}
.ckr label{text-transform:none;font-size:12px;letter-spacing:0;color:var(--ink-soft);cursor:pointer}
.bpub{width:100%;padding:11px;background:var(--orange);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:4px}
.bpub:hover{background:var(--orange-dk)}
.bpub:disabled{background:var(--muted);cursor:not-allowed}
.bsec{width:100%;padding:9px;background:none;color:var(--green);border:1.5px solid var(--green);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px;transition:all .2s}
.bsec:hover{background:#EAF2EA}
.mtbox{background:var(--meet-light);border:1px solid #c5d9f7;border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.mtbox a{color:var(--meet);font-size:12px;font-weight:500;text-decoration:none;word-break:break-all}
.mtbox a:hover{text-decoration:underline}
.bdg{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.gcal-box{background:#fff8e1;border:1px solid #ffe082;border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:12px;color:#5d4037;display:flex;align-items:flex-start;gap:8px}
.gcal-box a{color:#1565c0;font-weight:500;text-decoration:none}
.gcal-box a:hover{text-decoration:underline}
.mls{margin-bottom:12px}
.mlt{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mrow{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--sand-dark)}
.mrow:last-child{border-bottom:none}
.mav{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--white);flex-shrink:0}
.min2{flex:1}
.mnm{font-weight:500;font-size:12px}
.mem{font-size:10px;color:var(--muted)}
.mtm{font-size:10px;color:var(--muted);white-space:nowrap}
.jsc{border-top:1px solid var(--sand-dark);padding-top:14px}
.jsc h4{font-size:12px;font-weight:500;margin-bottom:8px}
.bjoin{width:100%;padding:10px;background:var(--green);color:var(--white);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s}
.bjoin:hover{background:var(--green-mid)}
.bdng{width:100%;padding:8px;background:none;color:var(--danger);border:1.5px solid var(--danger);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;margin-top:8px;transition:all .2s}
.bdng:hover{background:var(--danger-light)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--white);padding:10px 20px;border-radius:30px;font-size:12px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:720px){:root{--SW:0px;--HH:44px;--TC:32px}.sb{display:none}.al{grid-template-columns:1fr}.sbt{display:none}}
</style>
</head>
<body>

<script type="module">

const ALLOWED=['jorgepundang@gmail.com','caronarinsky@gmail.com','padinflavia@gmail.com','darianatirpak@gmail.com','miluavila44@gmail.com','rgiorgiotti@gmail.com','mikeyle3@gmail.com'];
const CARO_EMAIL='caronarinsky@gmail.com';
const CARO_MEET='https://meet.google.com/odj-bmmx-qpf';
const CAL_URL='https://rgiorgiotti-ui.github.io/coaching-calendar/';

// Members visible in panel (Mike excluded)
const MB=[

];
// Full members including Mike (for color lookups)
const MB_ALL=MB.concat([{n:'Mikey',c:'#888780',l:'#F1EFE8',e:'mikeyle3@gmail.com'}]);
const DEF={c:'#7A9E7E',l:'#C8DEC9'};
const ms=function(e){return MB_ALL.find(function(m){return m.e===String(e).toLowerCase()})||DEF};

const AR='America/Argentina/Buenos_Aires';
const TZLIST=[AR,'America/Santiago','America/Lima','America/Bogota','America/Mexico_City','America/New_York','America/Los_Angeles','Europe/Madrid','Europe/London','America/Montevideo','America/Sao_Paulo'];
const lTz=function(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){return AR}};

function toAR(date,time,tz){
  if(!tz||tz===AR) return {date:date,time:time};
  try{
    const base=new Date(date+'T'+time+':00');
    const arStr=base.toLocaleString('sv-SE',{timeZone:AR});
    const srcStr=base.toLocaleString('sv-SE',{timeZone:tz});
    const diff=(new Date(arStr))-(new Date(srcStr));
    const adj=new Date(base.getTime()+diff);
    const adjStr=adj.toLocaleString('sv-SE',{timeZone:'UTC'});
    return {date:adjStr.slice(0,10),time:adjStr.slice(11,16)};
  }catch(e){return {date:date,time:time}}
}

// Meet link: fixed for Caro, random for others
function getMeetLink(ownerEmail){
  if(ownerEmail===CARO_EMAIL) return CARO_MEET;
  const c='abcdefghijklmnopqrstuvwxyz';
  const s=function(){return [0,1,2].map(function(){return c[~~(Math.random()*c.length)]}).join('')};
  return 'https://meet.google.com/'+s()+'-'+s()+'-'+s();
}

// Google Calendar link builder
function gcalLink(title,date,from,to,meetLink){
  var start=date.replace(/-/g,'')+'T'+from.replace(':','')+'00';
  var end=date.replace(/-/g,'')+'T'+to.replace(':','')+'00';
  var desc='Práctica de coaching\n'+CAL_URL+(meetLink?'\nMeet: '+meetLink:'');
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    +'&text='+encodeURIComponent(title)
    +'&dates='+start+'/'+end
    +'&details='+encodeURIComponent(desc)
    +'&ctz=America%2FArgentina%2FBuenos_Aires';
}

const HS=7,HE=22,HHpx=56;
const HOURS=Array.from({length:HE-HS},function(_,i){return HS+i});
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MON=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

let cu=null,slots=[],wo=0,unsub=null,mRole=null;
const pad=function(n){return String(n).padStart(2,'0')};
const fD=function(d){return d.toISOString().split('T')[0]};
const isT=function(d){return fD(d)===fD(new Date())};
const ini=function(n){return n.split(' ').map(function(w){return w[0]&&w[0].toUpperCase()||''}).slice(0,2).join('')};
const t2m=function(t){var p=t.split(':');return +p[0]*60+(+p[1])};
const roleIcon=function(r){return r==='coach'?'🎯 coach':r==='cliente'?'🌱 cliente':r==='ambos'?'🎯🌱 ambos':''};
const roleLabel=function(r){return r==='coach'?'🎯 Coach':r==='cliente'?'🌱 Cliente':r==='ambos'?'🎯🌱 Ambos':''};
const fmtDL=function(dateStr){var d=new Date(dateStr+'T12:00:00');return DAYS[d.getDay()]+' '+d.getDate()+' de '+MON[d.getMonth()]};
const wkD=function(off){
  var t=new Date(),m=new Date(t);
  m.setDate(t.getDate()-t.getDay()+1+off*7);
  return [0,1,2,3,4,5,6].map(function(i){var d=new Date(m);d.setDate(m.getDate()+i);return d});
};

// ── EMAIL VIA GMAIL ──
function openGmail(to,subject,body){
  var url='https://mail.google.com/mail/?view=cm'
    +'&to='+encodeURIComponent(to)
    +'&su='+encodeURIComponent(subject)
    +'&body='+encodeURIComponent(body);
  window.open(url,'_blank');
}

function mailJoined(slot,joiner,from,to){
  var dl=fmtDL(slot.date);
  var meet=slot.meetLink?'\n\n📹 Enlace de Meet: '+slot.meetLink:'';
  var body=joiner.name+' se ha sumado a tu práctica del '+dl+' de '+from+' a '+to+' hs.'
    +'\n\nRevisá el enlace de Meet antes de comenzar.'+meet
    +'\n\n🔗 Ver calendario: '+CAL_URL
    +'\n\n---\nCoachingSync';
  openGmail(slot.owner.email,joiner.name+' se sumó a tu práctica del '+dl,body);
}

function mailLeft(slot,leaver){
  var dl=fmtDL(slot.date);
  var body=leaver.name+' ha cancelado su participación en tu práctica del '+dl+' ('+slot.from+'–'+slot.to+' hs).'
    +'\n\nChequeá los datos de organización.'
    +'\n\n🔗 Ver calendario: '+CAL_URL
    +'\n\n---\nCoachingSync';
  openGmail(slot.owner.email,leaver.name+' canceló su participación — '+dl,body);
}

function mailEditedToMembers(slot,oldFrom,oldTo){
  var dl=fmtDL(slot.date);
  var meet=slot.meetLink?'\n\n📹 Enlace de Meet actualizado: '+slot.meetLink:'';
  slot.members.forEach(function(m){
    var body='El horario de la práctica del '+dl+' ha sido modificado.'
      +'\n\n🕐 Horario anterior: '+oldFrom+'–'+oldTo+' hs'
      +'\n🕐 Nuevo horario: '+slot.from+'–'+slot.to+' hs'
      +meet
      +'\n\n🔗 Ver cambios en el calendario: '+CAL_URL
      +'\n\n---\nCoachingSync';
    openGmail(m.email,'Modificación de práctica — '+dl,body);
  });
}

function mailCancelledToMembers(slot){
  var dl=fmtDL(slot.date);
  var body=slot.owner.name+' ha eliminado la disponibilidad del '+dl+' ('+slot.from+'–'+slot.to+' hs).'
    +'\n\nSi tenías confirmada tu participación, tu franja fue conservada de forma independiente.'
    +'\n\n🔗 Ver calendario: '+CAL_URL
    +'\n\n---\nCoachingSync';
  slot.members.forEach(function(m){
    openGmail(m.email,'Práctica cancelada — '+dl,body);
  });
}

function mailReminderToSelf(slot){
  var dl=fmtDL(slot.date);
  var meet=slot.meetLink?'\n📹 Meet: '+slot.meetLink:'';
  var body='Recordatorio: tenés una práctica agendada.\n\n📅 '+dl+'\n🕐 '+slot.from+'–'+slot.to+' hs'+meet
    +'\n\n🔗 Ver en el calendario: '+CAL_URL
    +'\n\n---\nCoachingSync';
  openGmail(cu.email,'Recordatorio: práctica del '+dl,body);
}

// ── INIT ──
document.getElementById('ls').style.display='none';
var sv=localStorage.getItem('cu')||sessionStorage.getItem('cu');
if(sv){cu=JSON.parse(sv);showApp();}
else document.getElementById('login').style.display='flex';

window.doLogin=function(){
  var n=document.getElementById('ln').value.trim();
  var e=document.getElementById('le').value.trim().toLowerCase();
  var err=document.getElementById('lerr');
  err.style.display='none';
  if(!n||!e||!e.includes('@')){showToast('Completá nombre y Gmail');return}
  if(!ALLOWED.includes(e)){err.style.display='block';return}
  cu={name:n,email:e,tz:lTz()};
  if(document.getElementById('rem').checked) localStorage.setItem('cu',JSON.stringify(cu));
  else sessionStorage.setItem('cu',JSON.stringify(cu));
  document.getElementById('login').style.display='none';
  showApp();
};

window.logout=function(){
  if(unsub)unsub();cu=null;
  localStorage.removeItem('cu');sessionStorage.removeItem('cu');
  document.getElementById('app').style.display='none';
  document.getElementById('ub').style.display='none';
  document.getElementById('login').style.display='flex';
};

function showApp(){
  document.getElementById('app').style.display='block';
  document.getElementById('ub').style.display='flex';
  document.getElementById('hn').textContent=cu.name;
  var m=ms(cu.email);
  var av=document.getElementById('hav');
  av.textContent=ini(cu.name);av.style.background=m.c;
  buildTimes();renderMem();subscribe();
}

function subscribe(){
  setSy(true);
  unsub=onSnapshot(query(collection(db,'slots'),orderBy('date')),function(snap){
    slots=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
    setSy(false);renderCal();renderMySl();
  },function(e){setSy(false);showToast('Error de conexión');console.error(e)});
}
function setSy(v){var d=document.getElementById('sd');if(d)d.className='sdot'+(v?' sy':'')}

function buildTimes(){
  document.getElementById('tls').innerHTML=HOURS.map(function(h){return '<div class="tl">'+pad(h)+':00</div>'}).join('');
}

function renderMem(){
  // Only show visible members (MB, not MB_ALL)
  document.getElementById('mp').innerHTML=MB.map(function(m){
    return '<div class="mchip"><div class="cdot" style="background:'+m.c+'"></div><span style="font-size:13px;font-weight:500">'+m.n+'</span></div>';
  }).join('');
}

function renderMySl(){
  var el=document.getElementById('ms2');
  var mine=slots.filter(function(s){return s.owner.email===cu.email}).sort(function(a,b){return a.date.localeCompare(b.date)});
  if(!mine.length){el.innerHTML='<span style="color:var(--muted);font-size:11px">Sin franjas aún.</span>';return}
  var m=ms(cu.email);
  el.innerHTML=mine.map(function(s){
    var d=new Date(s.date+'T12:00:00');
    var mem=(s.members||[]).length;
    return '<div class="msr" onclick="openSlotMo(\''+s.id+'\')"><div class="msd" style="background:'+m.c+'"></div><div><strong>'+DAYS[d.getDay()]+' '+d.getDate()+'/'+(d.getMonth()+1)+'</strong> <span style="color:var(--muted)">'+s.from+'-'+s.to+'</span> <span style="color:'+m.c+'">('+mem+')</span></div></div>';
  }).join('');
}

function renderCal(){
  var days=wkD(wo);
  var f=days[0],l=days[6];
  document.getElementById('wl').textContent=f.getDate()+' – '+l.getDate()+' de '+MON[l.getMonth()]+' '+l.getFullYear();
  document.getElementById('dh').innerHTML='<div class="the"></div>'+days.map(function(d){
    return '<div class="dhd'+(isT(d)?' tod':'')+'"><span>'+DAYS[d.getDay()]+'</span><span class="dn">'+d.getDate()+'</span></div>';
  }).join('');
  var tg=document.getElementById('tg');
  tg.querySelectorAll('.dc').forEach(function(e){e.remove()});
  days.forEach(function(day){
    var ds=fD(day);
    var col=document.createElement('div');
    col.className='dc';
    HOURS.forEach(function(h){
      var cell=document.createElement('div');
      cell.className='hcl';
      cell.addEventListener('click',function(){openCreate(ds,h)});
      col.appendChild(cell);
    });
    slots.filter(function(s){return s.date===ds}).forEach(function(s){col.appendChild(mkBlock(s))});
    tg.appendChild(col);
  });
}

function mkBlock(s){
  var isOwn=s.owner.email===cu.email;
  var joined=(s.members||[]).some(function(m){return m.email===cu.email});
  var m=ms(s.owner.email);
  var top=((t2m(s.from)-HS*60)/60)*HHpx;
  var h=Math.max(((t2m(s.to)-t2m(s.from))/60)*HHpx,18);
  var b=document.createElement('div');
  b.className='sb2';
  b.style.top=top+'px';
  b.style.height=h+'px';
  b.style.background=m.l;
  b.style.borderLeft='3px solid '+m.c;
  if(joined&&!isOwn) b.style.outline='2px solid '+m.c;
  var lbl=s.owner.name.split(' ')[0]+(isOwn?' ·yo':joined?' ·unido':'');
  var ri=roleIcon(s.role);
  var inner='<div class="sbn" style="color:'+m.c+'">'+lbl+'</div>'
    +'<div class="sbt" style="color:'+m.c+'">'+s.from+'–'+s.to+'</div>';
  if(ri) inner+='<div class="sbe">'+ri+'</div>';
  if(s.meetLink) inner+='<div class="sbe" style="color:#1a73e8">▶ Meet</div>';
  b.innerHTML=inner;
  b.addEventListener('click',function(e){e.stopPropagation();openSlotMo(s.id)});
  return b;
}

window.chW=function(dir){wo=dir===0?0:wo+dir;renderCal()};

// ── ROLE HTML ──
function roleHTML(pfx,cur){
  function mk(r,ic,lbl){
    return '<div class="ropt'+(cur===r?' sel':'')+'" id="'+pfx+'-'+r+'" onclick="selR(\''+pfx+'\',\''+r+'\')"><span class="ri">'+ic+'</span>'+lbl+'</div>';
  }
  return '<div class="rrow">'+mk('coach','🎯','Coach')+mk('cliente','🌱','Cliente')+mk('ambos','🎯🌱','Ambos')+'</div>';
}
window.selR=function(pfx,r){
  mRole=r;
  ['coach','cliente','ambos'].forEach(function(x){
    var el=document.getElementById(pfx+'-'+x);
    if(el) el.className='ropt'+(x===r?' sel':'');
  });
};

function tzOpts(cur){
  return TZLIST.map(function(z){
    return '<option value="'+z+'"'+(z===cur?' selected':'')+'>'+z.replace(/_/g,' ')+'</option>';
  }).join('');
}

// ── CREATE MODAL ──
function openCreate(dateStr,hour){
  mRole=null;
  var ds=dateStr||fD(new Date());
  var fv=hour!=null?pad(hour)+':00':'';
  var tv=hour!=null?pad(Math.min(hour+1,HE))+':00':'';
  var tz=lTz();
  document.getElementById('mc2').innerHTML=
    '<h3>Agregar disponibilidad</h3>'
    +'<div class="fg2"><label>Fecha</label><input type="date" id="cf-d" value="'+ds+'"/></div>'
    +'<div class="tc" style="margin-bottom:11px">'
      +'<div class="fg2"><label>Desde</label><input type="time" id="cf-f" value="'+fv+'"/></div>'
      +'<div class="fg2"><label>Hasta</label><input type="time" id="cf-t" value="'+tv+'"/></div>'
    +'</div>'
    +'<div class="fg2"><label>Zona horaria <span style="color:var(--muted);font-size:9px">(se convierte a hora AR)</span></label>'
      +'<select id="cf-tz">'+tzOpts(tz)+'</select>'
      +'<div class="tzn">Detectada: '+tz+'</div>'
    +'</div>'
    +'<div class="fg2"><label>Nota opcional</label><input type="text" id="cf-n" placeholder="Ej: disponible por Zoom"/></div>'
    +'<div class="fg2"><label>Rol <span style="color:var(--muted);font-size:9px">(opcional)</span></label><div style="margin-top:4px">'+roleHTML('cr',null)+'</div></div>'
    +'<div class="ckr"><input type="checkbox" id="cf-m" checked/><label for="cf-m">Generar enlace de Google Meet</label></div>'
    +'<div class="ckr"><input type="checkbox" id="cf-rem"/><label for="cf-rem">Enviarme un recordatorio por mail</label></div>'
    +'<div class="ckr"><input type="checkbox" id="cf-gcal"/><label for="cf-gcal">Agregar a Google Calendar</label></div>'
    +'<button class="bpub" id="cf-btn" onclick="doCreate()">Publicar franja horaria</button>';
  document.getElementById('mbg').className='mbg op';
}
window.openCreate=openCreate;

window.doCreate=async function(){
  var ds=document.getElementById('cf-d').value;
  var fr=document.getElementById('cf-f').value;
  var to=document.getElementById('cf-t').value;
  var note=document.getElementById('cf-n').value.trim();
  var tz=document.getElementById('cf-tz').value;
  var wm=document.getElementById('cf-m').checked;
  var wrem=document.getElementById('cf-rem').checked;
  var wgcal=document.getElementById('cf-gcal').checked;
  if(!ds||!fr||!to||fr>=to){showToast('Completá fecha y horario válido');return}
  var aF=toAR(ds,fr,tz);
  var aT=toAR(ds,to,tz);
  var meet=wm?getMeetLink(cu.email):null;
  var btn=document.getElementById('cf-btn');
  btn.disabled=true;btn.textContent='Publicando...';
  try{
    var slotData={
      owner:{name:cu.name,email:cu.email},
      date:aF.date,from:aF.time,to:aT.time,
      note:note,tz:tz,role:mRole,
      meetLink:meet,
      members:[],createdAt:Date.now()
    };
    await addDoc(collection(db,'slots'),slotData);
    mRole=null;closeMo();
    showToast('✓ Franja publicada');
    // Reminder mail
    if(wrem){
      var dl=fmtDL(aF.date);
      var meetTxt=meet?'\n📹 Meet: '+meet:'';
      var remBody='Recordatorio: creaste una práctica para el '+dl+' de '+aF.time+' a '+aT.time+' hs.'+meetTxt
        +'\n\n🔗 Ver en el calendario: '+CAL_URL
        +'\n\n---\nCoachingSync';
      openGmail(cu.email,'Recordatorio: práctica del '+dl,remBody);
    }
    // Google Calendar
    if(wgcal){
      var gcTitle='Práctica coaching — '+cu.name;
      var gcUrl=gcalLink(gcTitle,aF.date,aF.time,aT.time,meet);
      window.open(gcUrl,'_blank');
    }
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Publicar franja horaria'}
};

// ── EDIT MODAL ──
function openEdit(id){
  var s=slots.find(function(x){return x.id===id});
  if(!s) return;
  mRole=s.role||null;
  var meetInfo=s.meetLink
    ?'<div style="font-size:11px;color:var(--meet);word-break:break-all">'+s.meetLink+'</div>'
    :'<div style="font-size:11px;color:var(--muted)">Sin enlace</div>';
  var meetNote=s.owner.email===CARO_EMAIL
    ?'<div style="font-size:10px;color:var(--muted);margin-top:3px">Tu enlace Meet es fijo y se mantiene siempre.</div>'
    :'';
  document.getElementById('mc2').innerHTML=
    '<h3>Editar franja</h3>'
    +'<div class="fg2"><label>Fecha</label><input type="date" id="ef-d" value="'+s.date+'"/></div>'
    +'<div class="tc" style="margin-bottom:11px">'
      +'<div class="fg2"><label>Desde (hora AR)</label><input type="time" id="ef-f" value="'+s.from+'"/></div>'
      +'<div class="fg2"><label>Hasta (hora AR)</label><input type="time" id="ef-t" value="'+s.to+'"/></div>'
    +'</div>'
    +'<div class="fg2"><label>Nota</label><input type="text" id="ef-n" value="'+(s.note||'')+'"/></div>'
    +'<div class="fg2"><label>Rol</label><div style="margin-top:4px">'+roleHTML('er',s.role)+'</div></div>'
    +'<div class="fg2"><label>Meet actual</label>'+meetInfo+meetNote+'</div>'
    +'<button class="bpub" id="ef-btn" onclick="doEdit(\''+id+'\')">Guardar cambios</button>'
    +'<button class="bdng" onclick="confirmDel(\''+id+'\')">Eliminar esta franja</button>';
  document.getElementById('mbg').className='mbg op';
}
window.openEdit=openEdit;

window.doEdit=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var ds=document.getElementById('ef-d').value;
  var fr=document.getElementById('ef-f').value;
  var to=document.getElementById('ef-t').value;
  var note=document.getElementById('ef-n').value.trim();
  if(!ds||!fr||!to||fr>=to){showToast('Verificá fecha y horario');return}
  // Keep Caro's fixed meet, regenerate for others
  var newMeet=s.owner.email===CARO_EMAIL?CARO_MEET:(s.meetLink||getMeetLink(s.owner.email));
  var btn=document.getElementById('ef-btn');
  btn.disabled=true;btn.textContent='Guardando...';
  var oldFrom=s.from,oldTo=s.to;
  try{
    await updateDoc(doc(db,'slots',id),{
      date:ds,from:fr,to:to,note:note,
      role:mRole,meetLink:newMeet
    });
    mRole=null;closeMo();showToast('✓ Franja actualizada');
    // Notify members if times changed
    if((fr!==oldFrom||to!==oldTo)&&(s.members||[]).length>0){
      var updated=Object.assign({},s,{from:fr,to:to,meetLink:newMeet});
      mailEditedToMembers(updated,oldFrom,oldTo);
    }
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios'}
};

window.confirmDel=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var mem=s.members||[];
  var msg=mem.length>0
    ?'¿Eliminar tu franja? Los '+mem.length+' compañero(s) unidos conservarán su práctica de forma independiente y recibirán una notificación.'
    :'¿Eliminar esta franja?';
  if(!confirm(msg))return;
  try{
    if(mem.length>0) mailCancelledToMembers(s);
    for(var i=0;i<mem.length;i++){
      var m=mem[i];
      await addDoc(collection(db,'slots'),{
        owner:{name:m.name,email:m.email},
        date:s.date,from:m.from,to:m.to,
        note:'Práctica (de '+s.owner.name+')',
        meetLink:s.meetLink||null,
        role:m.role||null,
        members:[],createdAt:Date.now()
      });
    }
    await deleteDoc(doc(db,'slots',id));
    closeMo();
    showToast(mem.length>0?'Franja eliminada — compañeros conservados':'Franja eliminada');
  }catch(e){showToast('Error: '+e.message)}
};

// ── SLOT DETAIL MODAL ──
function openSlotMo(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var isOwn=s.owner.email===cu.email;
  var joined=(s.members||[]).some(function(m){return m.email===cu.email});
  var m=ms(s.owner.email);
  var dl=fmtDL(s.date);
  var rl=roleLabel(s.role);

  var html='<h3 style="color:'+m.c+'">'+s.owner.name+'</h3>';
  html+='<div class="mme">'+dl+' · '+s.from+'–'+s.to;
  if(rl) html+=' <span class="bdg" style="background:'+m.l+';color:'+m.c+'">'+rl+'</span>';
  if(s.note) html+=' <span>· '+s.note+'</span>';
  html+='</div>';

  if(s.meetLink){
    var gcUrl=gcalLink('Práctica coaching — '+s.owner.name,s.date,s.from,s.to,s.meetLink);
    html+='<div class="mtbox"><span style="font-size:17px;flex-shrink:0">📹</span>'
      +'<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Google Meet</div>'
      +'<a href="'+s.meetLink+'" target="_blank">'+s.meetLink+'</a></div></div>';
    html+='<div class="gcal-box"><span style="font-size:17px;flex-shrink:0">📅</span>'
      +'<div><div style="font-size:10px;color:#5d4037;margin-bottom:2px">Sincronizar con Google Calendar</div>'
      +'<a href="'+gcUrl+'" target="_blank">Agregar al calendario</a></div></div>';
  }

  var mem=s.members||[];
  if(mem.length>0){
    html+='<div class="mls"><div class="mlt">Quienes se unieron</div>';
    for(var i=0;i<mem.length;i++){
      var mb=mem[i];
      var mm=ms(mb.email||'');
      var mr=roleIcon(mb.role);
      html+='<div class="mrow">'
        +'<div class="mav" style="background:'+mm.c+'">'+ini(mb.name)+'</div>'
        +'<div class="min2"><div class="mnm">'+mb.name+'</div><div class="mem">'+mb.email+'</div></div>'
        +'<div class="mtm">'+mb.from+'–'+mb.to+(mr?' · '+mr:'')+'</div>'
        +'</div>';
    }
    html+='</div>';
  }

  if(!isOwn&&!joined){
    mRole=null;
    html+='<div class="jsc"><h4>Sumate a esta práctica</h4>'
      +'<div class="tc" style="margin-bottom:8px">'
        +'<div class="fg2"><label>Desde</label><input type="time" id="jf" value="'+s.from+'"/></div>'
        +'<div class="fg2"><label>Hasta</label><input type="time" id="jt" value="'+s.to+'"/></div>'
      +'</div>'
      +'<div class="fg2"><label>Rol <span style="color:var(--muted);font-size:9px">(opcional)</span></label><div style="margin-top:4px">'+roleHTML('jr',null)+'</div></div>'
      +'<button class="bjoin" onclick="joinSlot(\''+id+'\')">Unirme a esta práctica</button></div>';
  } else if(joined){
    var me=mem.find(function(m){return m.email===cu.email});
    html+='<div class="jsc">'
      +'<div style="color:var(--green);font-weight:500;font-size:12px;margin-bottom:8px">✓ Ya estás unido ('+me.from+'–'+me.to+(me.role?' · '+roleIcon(me.role):'')+' )</div>'
      +'<button class="bdng" onclick="leaveSlot(\''+id+'\')">Salir de esta práctica</button></div>';
  } else {
    html+='<div class="jsc">'
      +'<button class="bsec" onclick="openEdit(\''+id+'\')">✏️ Editar esta franja</button>'
      +'<button class="bdng" onclick="confirmDel(\''+id+'\')">Eliminar esta franja</button></div>';
  }

  document.getElementById('mc2').innerHTML=html;
  document.getElementById('mbg').className='mbg op';
}
window.openSlotMo=openSlotMo;

window.joinSlot=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var fr=document.getElementById('jf').value;
  var to=document.getElementById('jt').value;
  if(!fr||!to||fr>=to){showToast('Verificá el horario');return}
  if(fr<s.from||to>s.to){showToast('Debe estar dentro de la franja disponible');return}
  var newMem=(s.members||[]).concat([{name:cu.name,email:cu.email,from:fr,to:to,role:mRole}]);
  try{
    await updateDoc(doc(db,'slots',id),{members:newMem});
    mRole=null;closeMo();showToast('✓ Te uniste');
    mailJoined(s,cu,fr,to);
  }catch(e){showToast('Error: '+e.message)}
};

window.leaveSlot=async function(id){
  var s=slots.find(function(x){return x.id===id});if(!s)return;
  var newMem=(s.members||[]).filter(function(m){return m.email!==cu.email});
  try{
    await updateDoc(doc(db,'slots',id),{members:newMem});
    closeMo();showToast('Saliste de la práctica');
    mailLeft(s,cu);
  }catch(e){showToast('Error: '+e.message)}
};

window.closeMo=function(){document.getElementById('mbg').className='mbg'};
window.closeBg=function(e){if(e.target===document.getElementById('mbg'))closeMo()};

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},3000);
}
</script>
